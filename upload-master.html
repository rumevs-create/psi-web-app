<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Master Data PSI - PSI Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body {
            background: var(--color-cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        .navbar {
            background-color: var(--color-olive) !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.3rem;
        }

        .btn-light-custom {
            background-color: white;
            border: none;
            color: var(--color-olive);
            font-weight: 500;
        }

        .btn-light-custom:hover {
            background-color: var(--color-yellow);
            color: var(--color-olive);
        }

        .form-container {
            max-width: 900px;
            margin: 30px auto;
        }

        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .form-header {
            background: var(--color-mint);
            color: white;
            padding: 25px 30px;
        }

        .form-header h5 {
            margin: 0;
            font-weight: 600;
            font-size: 1.3rem;
        }

        .form-body {
            padding: 30px;
        }

        .form-label {
            color: var(--color-olive);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 12px 15px;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--color-mint);
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        textarea.form-control {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            min-height: 400px;
        }

        .btn-submit {
            background: var(--color-mint);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
        }

        .btn-submit:hover {
            background: #5db88d;
        }

        .btn-download {
            background: var(--color-yellow);
            border: none;
            color: var(--color-olive);
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
        }

        .btn-download:hover {
            background: #f5d87a;
        }

        .alert-success {
            background-color: var(--color-mint);
            color: white;
            border: none;
        }

        .alert-danger {
            background-color: var(--color-red);
            color: white;
            border: none;
        }

        .template-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .nav-tabs .nav-link {
            color: var(--color-olive);
            font-weight: 500;
        }

        .nav-tabs .nav-link.active {
            background-color: var(--color-mint);
            color: white;
            border-color: var(--color-mint);
        }

        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-4">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt me-2"></i>PSI Management System
            </span>
            <div>
                <a href="dashboard.html" class="btn btn-light-custom btn-sm me-2">
                    <i class="fas fa-arrow-left me-1"></i> Kembali
                </a>
                <button class="btn btn-light-custom btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container form-container">
        <div class="form-card">
            <div class="form-header">
                <h5><i class="fas fa-upload me-2"></i>Upload Master Data PSI</h5>
            </div>
            
            <div class="form-body">
                <div id="alertMessage" class="alert d-none mb-4"></div>

                <ul class="nav nav-tabs mb-4" id="uploadTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="upload-tab" data-bs-toggle="tab" data-bs-target="#upload" type="button">
                            <i class="fas fa-upload me-1"></i> Upload JSON
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="template-tab" data-bs-toggle="tab" data-bs-target="#template" type="button">
                            <i class="fas fa-file-code me-1"></i> Template
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="uploadTabContent">
                    <!-- Upload Tab -->
                    <div class="tab-pane fade show active" id="upload" role="tabpanel">
                        <div class="mb-3">
                            <label class="form-label">Tipe Equipment</label>
                            <select class="form-select" id="tipeEquipment" required>
                                <option value="">Pilih Tipe Equipment</option>
                                <option value="pressure_vessel">Pressure Vessels (EHSF-402-02)</option>
                                <option value="heat_exchanger">Heat Exchangers (EHSF-402-03)</option>
                                <option value="piping">Piping Systems (EHSF-402-04)</option>
                                <option value="rotating">Rotating Equipment (EHSF-402-05)</option>
                                <option value="relief_systems">Relief and Vent Systems (EHSF-402-06)</option>
                                <option value="storage_tank">Storage Tanks (EHSF-402-07)</option>
                                <option value="fired_heater">Fired Heaters/Boilers (EHSF-402-08)</option>
                                <option value="electrical">Electrical Systems (EHSF-402-09)</option>
                                <option value="instrumentation">Instrumentation and Control (EHSF-402-10)</option>
                                <option value="reactors">Reactors (EHSF-402-11)</option>
                                <option value="columns_towers">Columns/Towers (EHSF-402-12)</option>
                                <option value="compressors">Compressors/Blowers (EHSF-402-13)</option>
                                <option value="cooling_towers">Cooling Towers (EHSF-402-14)</option>
                                <option value="utility_systems">Utility Systems (EHSF-402-15)</option>
                                <option value="safety_systems">Safety Systems (EHSF-402-16)</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Master Data JSON</label>
                            <textarea class="form-control" id="jsonInput" placeholder="Paste JSON master data di sini..."></textarea>
                            <div class="form-text text-muted">
                                Format: JSON dengan struktur sections dan items. Lihat tab Template untuk contoh.
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-submit" onclick="validateAndUpload()">
                                <i class="fas fa-cloud-upload-alt me-2"></i>Upload ke Database
                            </button>
                            <button class="btn btn-download" onclick="loadSample()">
                                <i class="fas fa-vial me-2"></i>Load Sample
                            </button>
                            <button class="btn btn-secondary" onclick="clearForm()">
                                <i class="fas fa-trash me-2"></i>Clear
                            </button>
                        </div>
                    </div>

                    <!-- Template Tab -->
                    <div class="tab-pane fade" id="template" role="tabpanel">
                        <div class="template-section">
                            <h6 class="mb-3">Struktur JSON yang Diperlukan:</h6>
                            <pre id="templateJson"></pre>
                            <button class="btn btn-download btn-sm mt-2" onclick="downloadTemplate()">
                                <i class="fas fa-download me-1"></i> Download Template
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Check auth
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            }
        });

        // Sample template
        const sampleTemplate = {
            "nama_form": "EHSF-402-02 Pressure Vessel Inspection",
            "sections": {
                "A": {
                    "judul": "A. General Information",
                    "icon": "info-circle",
                    "items": {
                        "A1": {
                            "kode": "A.1",
                            "nama": "Tag Number",
                            "kategori": 1,
                            "wajib": true,
                            "input_type": "text"
                        },
                        "A2": {
                            "kode": "A.2",
                            "nama": "Equipment Name",
                            "kategori": 1,
                            "wajib": true,
                            "input_type": "text"
                        },
                        "A3": {
                            "kode": "A.3",
                            "nama": "Service/Fluid",
                            "kategori": 1,
                            "wajib": true,
                            "input_type": "text"
                        }
                    }
                },
                "B": {
                    "judul": "B. Design Data",
                    "icon": "ruler-combined",
                    "items": {
                        "B1": {
                            "kode": "B.1",
                            "nama": "Design Pressure (barg)",
                            "kategori": 1,
                            "wajib": true,
                            "input_type": "number"
                        },
                        "B2": {
                            "kode": "B.2",
                            "nama": "Design Temperature (°C)",
                            "kategori": 1,
                            "wajib": true,
                            "input_type": "number"
                        }
                    }
                }
            }
        };

        // Display template
        document.getElementById('templateJson').textContent = JSON.stringify(sampleTemplate, null, 2);

        function validateAndUpload() {
            const tipe = document.getElementById('tipeEquipment').value;
            const jsonText = document.getElementById('jsonInput').value.trim();

            if (!tipe) {
                showAlert('Pilih tipe equipment terlebih dahulu!', 'danger');
                return;
            }

            if (!jsonText) {
                showAlert('Masukkan JSON data!', 'danger');
                return;
            }

            let data;
            try {
                data = JSON.parse(jsonText);
            } catch (e) {
                showAlert('JSON tidak valid: ' + e.message, 'danger');
                return;
            }

            // Validate structure
            if (!data.nama_form || !data.sections) {
                showAlert('Struktur JSON salah! Harus memiliki "nama_form" dan "sections"', 'danger');
                return;
            }

            // Upload to Firebase
            database.ref(tipe).set(data)
                .then(() => {
                    showAlert('Master data berhasil diupload untuk: ' + tipe, 'success');
                    document.getElementById('jsonInput').value = '';
                })
                .catch((error) => {
                    showAlert('Gagal upload: ' + error.message, 'danger');
                });
        }

        function loadSample() {
            document.getElementById('jsonInput').value = JSON.stringify(sampleTemplate, null, 2);
            showAlert('Sample data dimuat. Sesuaikan dengan kebutuhan Anda.', 'success');
        }

        function clearForm() {
            document.getElementById('jsonInput').value = '';
            document.getElementById('tipeEquipment').value = '';
        }

        function downloadTemplate() {
            const dataStr = JSON.stringify(sampleTemplate, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'psi_master_template.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type} mb-4`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${message}`;
            alertDiv.classList.remove('d-none');
            
            setTimeout(() => {
                alertDiv.classList.add('d-none');
            }, 5000);
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
