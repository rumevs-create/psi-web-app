<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSI Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body { 
            background: linear-gradient(135deg, #666547 0%, #6fcb9f 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .login-card { 
            background: #fffeb3; 
            border-radius: 20px; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(102, 101, 71, 0.3);
        }

        .login-card h3 {
            color: #666547;
        }

        .form-control {
            border: 2px solid #ffe28a;
            border-radius: 10px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #6fcb9f;
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        .form-label {
            color: #666547;
            font-weight: 500;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6fcb9f 0%, #5db88d 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #5db88d 0%, #6fcb9f 100%);
        }

        .alert-danger {
            background-color: #fb2e01;
            color: #fff;
            border: none;
            border-radius: 10px;
        }

        .text-muted {
            color: #666547 !important;
            opacity: 0.7;
        }

        hr {
            border-color: #ffe28a;
            opacity: 1;
        }

        .input-group-text {
            background-color: #ffe28a;
            border: 2px solid #ffe28a;
            color: #666547;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">
            <i class="fas fa-shield-alt" style="color: #6fcb9f;"></i> PSI Management System
        </h3>
        
        <div id="errorMsg" class="alert alert-danger d-none"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" required 
                           placeholder="nama@perusahaan.com">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" required
                           placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <hr>
        <p class="text-center text-muted small">Hubungi admin untuk akses</p>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <script>
        // 🔥 KONFIGURASI FIREBASE - RTDB
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    window.location.href = 'dashboard.html';
                })
                .catch((error) => {
                    const errorDiv = document.getElementById('errorMsg');
                    errorDiv.classList.remove('d-none');
                    errorDiv.textContent = 'Email atau password salah';
                    console.error('Login error:', error);
                });
        });

        // Cek jika sudah login
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
