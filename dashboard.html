<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
            
            --card-1: #666547; /* Olive */
            --card-2: #fb2e01; /* Red */
            --card-3: #6fcb9f; /* Mint */
            --card-4: #ffe28a; /* Yellow */
        }

        body {
            background: #fffeb3;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 101, 71, 0.15);
            transition: all 0.3s ease;
        }

        .summary-card {
            position: relative;
            overflow: hidden;
            border: none;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.5s ease;
        }

        .summary-card:hover::before {
            transform: scale(3);
        }

        .summary-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102, 101, 71, 0.2);
        }

        /* Custom backgrounds dari palet */
        .bg-card-1 { background-color: var(--card-1) !important; }
        .bg-card-2 { background-color: var(--card-2) !important; }
        .bg-card-3 { background-color: var(--card-3) !important; }
        .bg-card-4 { background-color: var(--card-4) !important; color: #666547 !important; }

        .bg-card-4 .opacity-75 {
            color: #666547;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(102, 101, 71, 0.1);
        }

        .navbar {
            background-color: #666547 !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
        }

        /* User info di navbar */
        .navbar .bg-white.bg-opacity-25 {
            background-color: rgba(255, 255, 255, 0.2) !important;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #userEmail {
            font-size: 0.9rem;
            line-height: 1.2;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-success {
            background-color: #6fcb9f;
            border: none;
            color: #fff;
        }

        .btn-success:hover {
            background-color: #5db88d;
            color: #fff;
        }

        .btn-light {
            background-color: #fffeb3;
            border: none;
            color: #666547;
        }

        .btn-light:hover {
            background-color: #ffe28a;
            color: #666547;
        }

        .btn-view-all {
            background-color: #fb2e01;
            border: none;
            color: white;
            padding: 0.375rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-view-all:hover {
            background-color: #d92701;
            transform: translateX(5px);
            color: white;
        }

        .table-dark {
            background-color: #666547 !important;
        }

        .table-dark th {
            border: none;
            font-weight: 500;
            background-color: #666547 !important;
        }

        .badge.bg-info {
            background-color: #6fcb9f !important;
            color: #fff;
        }

        .badge.bg-danger {
            background-color: #fb2e01 !important;
            color: #fff;
        }

        .badge.bg-secondary {
            background-color: #ffe28a !important;
            color: #666547;
        }

        .text-primary {
            color: #666547 !important;
        }

        .form-control:focus {
            border-color: #6fcb9f;
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        .input-group-text {
            background-color: #fffeb3;
            border: 1px solid #ffe28a;
            color: #666547;
        }

        .form-control {
            border: 1px solid #ffe28a;
        }

        .form-control:focus {
            background-color: #fff;
        }

        .btn-outline-primary {
            color: #666547;
            border-color: #666547;
        }

        .btn-outline-primary:hover {
            background-color: #666547;
            border-color: #666547;
            color: #fffeb3;
        }

        .btn-outline-warning {
            color: #fb2e01;
            border-color: #fb2e01;
        }

        .btn-outline-warning:hover {
            background-color: #fb2e01;
            border-color: #fb2e01;
            color: #fff;
        }

        .btn-outline-danger {
            color: #fb2e01;
            border-color: #fb2e01;
        }

        .btn-outline-danger:hover {
            background-color: #fb2e01;
            border-color: #fb2e01;
            color: #fff;
        }

        .spinner-border.text-primary {
            color: #666547 !important;
        }

        h5, h6 {
            font-weight: 600;
            color: #666547;
        }

        .card-title {
            color: inherit;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management
            </span>
            <div class="d-flex align-items-center gap-3">
                <!-- User Info -->
                <div class="text-white d-flex align-items-center gap-2" id="userInfo">
                    <div class="bg-white bg-opacity-25 rounded-circle p-2">
                        <i class="fas fa-user-circle fa-lg"></i>
                    </div>
                    <div class="d-none d-md-block">
                        <div class="small opacity-75">Signed in as</div>
                        <div class="fw-semibold" id="userEmail">Loading...</div>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="d-flex gap-2">
                    <button class="btn btn-light btn-sm" onclick="window.location.href='import-data.html'">
                        <i class="fas fa-file-import me-1"></i> Import Data
                    </button>
                    <button class="btn btn-success btn-sm" onclick="window.location.href='tambah-equipment.html'">
                        <i class="fas fa-plus me-1"></i> Tambah Equipment
                    </button>
                    <button class="btn btn-light btn-sm" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Summary Cards -->
        <div class="row mb-4" id="summaryCards">
            <div class="col-md-3 mb-3">
                <div class="card text-white summary-card bg-card-1">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">Total Equipment</h6>
                                <h2 class="mb-0" id="totalEquip">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="fas fa-cubes fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white summary-card bg-card-2">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">Kategori 1 (Critical)</h6>
                                <h2 class="mb-0" id="kategori1">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="fas fa-exclamation-triangle fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white summary-card bg-card-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">PSI Complete</h6>
                                <h2 class="mb-0" id="psiComplete">0%</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="fas fa-check-circle fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card summary-card bg-card-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">Need Update</h6>
                                <h2 class="mb-0" id="needUpdate">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-50 rounded-circle p-3">
                                <i class="fas fa-clock fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Equipment Table -->
        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-3">
                    <h5 class="mb-0">
                        <i class="fas fa-list text-primary"></i> Daftar Equipment
                    </h5>
                    <div class="d-flex gap-2">
                        <button class="btn btn-light btn-sm" onclick="window.location.href='import-data.html'">
                            <i class="fas fa-file-import me-1"></i> Import Data
                        </button>
                        <button class="btn btn-light btn-sm" onclick="window.location.href='tambah-equipment.html'">
                            <i class="fas fa-plus me-1"></i> Tambah Equipment
                        </button>
                        <button class="btn-view-all btn-sm" onclick="viewAllEquipment()">
                            Lihat Semua <i class="fas fa-arrow-right ms-1"></i>
                        </button>
                    </div>
                </div>
                <div class="input-group" style="width: 300px;">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" 
                           placeholder="Cari equipment..." onkeyup="searchEquipment()">
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="equipmentTable">
                    <thead class="table-dark">
                        <tr>
                            <th class="rounded-start">Equipment ID</th>
                            <th>Nama</th>
                            <th>Area</th>
                            <th>Kategori</th>
                            <th>Kustodian</th>
                            <th>Progress PSI</th>
                            <th class="rounded-end">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="equipmentList">
                        <tr>
                            <td colspan="7" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-3 text-muted">Memuat data equipment...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script>
        // 🔥 KONFIGURASI FIREBASE - RTDB
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Global variables
        let allEquipment = [];
        let psiMaster = null;

        // Cek login
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                console.log('User logged in:', user.email);
                
                // Tampilkan email user di navbar
                document.getElementById('userEmail').textContent = user.email;
                
                loadData();
            }
        });

        async function loadData() {
            try {
                // Load master PSI data untuk hitung progress
                const masterSnapshot = await database.ref('pressure_vessel').once('value');
                psiMaster = masterSnapshot.val();
                
                // Load equipment data
                const equipmentRef = database.ref('equipment');
                equipmentRef.on('value', (snapshot) => {
                    const equipmentData = snapshot.val() || {};
                    
                    // Convert object to array dengan key
                    allEquipment = Object.keys(equipmentData).map(key => ({
                        key: key,
                        ...equipmentData[key]
                    }));
                    
                    renderTable(allEquipment);
                    updateSummary(allEquipment);
                }, (error) => {
                    console.error('Error loading equipment:', error);
                    document.getElementById('equipmentList').innerHTML = `
                        <tr>
                            <td colspan="7" class="text-center text-danger">
                                <i class="fas fa-exclamation-circle"></i> 
                                Gagal memuat data: ${error.message}
                            </td>
                        </tr>
                    `;
                });
                
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function renderTable(equipmentList) {
            const tbody = document.getElementById('equipmentList');
            
            if (equipmentList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="fas fa-inbox fa-3x mb-3 opacity-25"></i>
                            <p class="fs-5">Tidak ada equipment</p>
                            <button class="btn btn-success mt-2" onclick="window.location.href='tambah-equipment.html'">
                                <i class="fas fa-plus"></i> Tambah Equipment Baru
                            </button>
                        </td>
                    </tr>
                `;
                return;
            }

            let html = '';
            equipmentList.forEach((data) => {
                const kategoriBadge = data.kategori === 1 
                    ? '<span class="badge bg-danger">Critical</span>'
                    : `<span class="badge bg-secondary">Kat ${data.kategori}</span>`;
                
                const progressBar = renderProgressBar(data.psi_progress, data.psi_wajib_progress);
                const tipeLabel = getTipeLabel(data.tipe);
                
                html += `
                    <tr>
                        <td><strong class="text-primary">${data.equip_id}</strong></td>
                        <td>
                            <div class="fw-semibold">${data.nama}</div>
                            <small class="text-muted"><i class="fas fa-tag me-1"></i>${tipeLabel}</small>
                        </td>
                        <td><span class="badge bg-info">${data.area}</span></td>
                        <td>${kategoriBadge}</td>
                        <td>${data.kustodian}</td>
                        <td style="width: 160px;">${progressBar}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${data.equip_id}')" 
                                        title="Lihat Detail PSI">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-warning" onclick="editEquipment('${data.key}')" 
                                        title="Edit Equipment">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteEquipment('${data.key}', '${data.equip_id}')" 
                                        title="Hapus">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        function updateSummary(equipmentList) {
            const total = equipmentList.length;
            const kat1 = equipmentList.filter(e => e.kategori === 1).length;
            
            let totalProgress = 0;
            let totalWajibProgress = 0;
            equipmentList.forEach(e => {
                totalProgress += (e.psi_progress || 0);
                totalWajibProgress += (e.psi_wajib_progress || 0);
            });
            const avgProgress = total > 0 ? Math.round(totalProgress / total) : 0;
            
            const needUpdate = equipmentList.filter(e => 
                (e.psi_progress || 0) < 100 || (e.psi_wajib_progress || 0) < 100
            ).length;
            
            document.getElementById('totalEquip').textContent = total;
            document.getElementById('kategori1').textContent = kat1;
            document.getElementById('psiComplete').textContent = avgProgress + '%';
            document.getElementById('needUpdate').textContent = needUpdate;
        }

        function searchEquipment() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allEquipment.filter(e => 
                e.equip_id.toLowerCase().includes(searchTerm) ||
                e.nama.toLowerCase().includes(searchTerm) ||
                e.area.toLowerCase().includes(searchTerm) ||
                e.kustodian.toLowerCase().includes(searchTerm) ||
                getTipeLabel(e.tipe).toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        }

        function viewAllEquipment() {
            document.getElementById('searchInput').value = '';
            renderTable(allEquipment);
            
            document.querySelector('.table-container').scrollIntoView({ 
                behavior: 'smooth' 
            });
        }

        function viewDetail(equipId) {
            window.location.href = `detail.html?id=${equipId}`;
        }

        function editEquipment(key) {
            window.location.href = `edit-equipment.html?id=${key}`;
        }

        function deleteEquipment(key, equipId) {
            if (!confirm(`Yakin ingin menghapus equipment ${equipId}?`)) {
                return;
            }
            
            database.ref('equipment/' + key).remove()
                .then(() => {
                    return database.ref('psi_data/' + equipId).remove();
                })
                .then(() => {
                    alert('Equipment berhasil dihapus');
                })
                .catch((error) => {
                    alert('Gagal menghapus: ' + error.message);
                });
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        // Helper Functions
        function getTipeLabel(tipe) {
            const labels = {
                'pressure_vessel': 'Pressure Vessel',
                'heat_exchanger': 'Heat Exchanger',
                'piping': 'Piping',
                'rotating': 'Rotating',
                'relief_systems': 'Relief System',
                'storage_tank': 'Storage Tank',
                'fired_heater': 'Fired Heater',
                'electrical': 'Electrical',
                'instrumentation': 'Instrumentation',
                'reactors': 'Reactor',
                'columns_towers': 'Column/Tower',
                'compressors': 'Compressor',
                'cooling_towers': 'Cooling Tower',
                'utility_systems': 'Utility',
                'safety_systems': 'Safety System'
            };
            return labels[tipe] || tipe || '-';
        }

        function renderProgressBar(progress, wajibProgress) {
            const pct = progress || 0;
            
            let barColor = '#666547';
            if (pct >= 80) {
                barColor = '#6fcb9f';
            } else if (pct >= 50) {
                barColor = '#ffe28a';
            } else if (pct >= 30) {
                barColor = '#fb2e01';
            }
            
            let warningBadge = '';
            if ((wajibProgress || 0) < 100) {
                warningBadge = '<span class="badge bg-danger ms-1" title="Dokumen wajib belum lengkap"><i class="fas fa-exclamation"></i></span>';
            }
            
            return `
                <div class="d-flex align-items-center">
                    <div class="progress flex-grow-1" style="height: 10px; border-radius: 5px; background: #fffeb3;">
                        <div class="progress-bar" role="progressbar" 
                             style="width: ${pct}%; border-radius: 5px; background-color: ${barColor};"></div>
                    </div>
                    <span class="ms-2 small fw-bold" style="color: #666547;">${pct}%</span>
                    ${warningBadge}
                </div>
            `;
        }
    </script>
</body>
</html>
