<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Equipment - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body {
            background: #fffeb3;
        }

        .form-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .required::after {
            content: " *";
            color: #fb2e01;
        }

        .navbar {
            background-color: #666547 !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 101, 71, 0.15);
        }

        .card-header {
            background-color: #ffe28a !important;
            color: #666547 !important;
            border-bottom: none;
            border-radius: 15px 15px 0 0 !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #6fcb9f;
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        .form-control, .form-select {
            border: 1px solid #ffe28a;
        }

        .btn-warning {
            background-color: #ffe28a;
            border: none;
            color: #666547;
        }

        .btn-warning:hover {
            background-color: #fb2e01;
            color: #fff;
        }

        .btn-danger {
            background-color: #fb2e01;
            border: none;
        }

        .btn-danger:hover {
            background-color: #e02900;
        }

        .btn-secondary {
            background-color: #666547;
            border: none;
        }

        .btn-secondary:hover {
            background-color: #55543d;
        }

        .form-check-input:checked {
            background-color: #6fcb9f;
            border-color: #6fcb9f;
        }

        .alert-success {
            background-color: #6fcb9f;
            color: #fff;
            border: none;
        }

        .alert-danger {
            background-color: #fb2e01;
            color: #fff;
            border: none;
        }

        .form-text {
            color: #666547;
        }

        .text-muted {
            color: #666547 !important;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management - Edit Equipment
            </span>
            <div>
                <button class="btn btn-light me-2" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                <button class="btn btn-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4 form-container">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-edit"></i> Edit Equipment</h5>
            </div>
            <div class="card-body">
                <div id="loadingDiv" class="text-center py-4">
                    <div class="spinner-border text-primary" role="status" style="color: #666547 !important;">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 text-muted">Memuat data equipment...</p>
                </div>
                
                <div id="alertMessage" class="alert d-none"></div>
                
                <form id="equipmentForm" style="display: none;">
                    <!-- Hidden field untuk RTDB key -->
                    <input type="hidden" id="equipmentKey">
                    <input type="hidden" id="originalEquipId">
                    <input type="hidden" id="originalTipe">
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Equipment ID</label>
                            <input type="text" class="form-control" id="equip_id" required 
                                   placeholder="Contoh: V-1101">
                            <div class="form-text">ID unik equipment</div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Nama Equipment</label>
                            <input type="text" class="form-control" id="nama" required 
                                   placeholder="Contoh: PTA Slurry Vessel">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Area</label>
                            <select class="form-select" id="area" required>
                                <option value="">Pilih Area</option>
                                <option value="CP-1100">CP-1100</option>
                                <option value="CP-1200">CP-1200</option>
                                <option value="CP-1300">CP-1300</option>
                                <option value="CP-1400">CP-1400</option>
                                <option value="Utility-5300">Utility-5300</option>
                                <option value="Utility-6000">Utility-6000</option>
                                <option value="Utility-6300">Utility-6300</option>
                                <option value="SSP-1700">SSP-1700</option>
                                <option value="SSP-1800">SSP-1800</option>
                                <option value="Lainnya">Lainnya...</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3" id="areaLainnyaDiv" style="display: none;">
                            <label class="form-label">Area (Lainnya)</label>
                            <input type="text" class="form-control" id="area_lainnya">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Kategori</label>
                            <select class="form-select" id="kategori" required>
                                <option value="">Pilih Kategori</option>
                                <option value="1">Kategori 1 (EHS Critical)</option>
                                <option value="2">Kategori 2 (Non-Critical)</option>
                                <option value="3">Kategori 3 (Valued)</option>
                            </select>
                            <div class="form-check mt-2">
                                <input type="checkbox" class="form-check-input" id="is_critical" disabled>
                                <label class="form-check-label">EHS Critical Equipment</label>
                            </div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label required">Kustodian</label>
                            <select class="form-select" id="kustodian" required>
                                <option value="">Pilih Kustodian</option>
                                <option value="Process Engineer">Process Engineer</option>
                                <option value="Maintenance Engineer">Maintenance Engineer</option>
                                <option value="Mechanical Engineer">Mechanical Engineer</option>
                                <option value="EHS Engineer">EHS Engineer</option>
                                <option value="Instrument Engineer">Instrument Engineer</option>
                                <option value="Electrical Engineer">Electrical Engineer</option>
                                <option value="Utility Supervisor">Utility Supervisor</option>
                                <option value="Document Control">Document Control</option>
                                <option value="Lainnya">Lainnya...</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3" id="kustodianLainnyaDiv" style="display: none;">
                        <label class="form-label">Kustodian (Lainnya)</label>
                        <input type="text" class="form-control" id="kustodian_lainnya">
                    </div>

                    <!-- Tipe Equipment - UPDATED -->
                    <div class="mb-3">
                        <label class="form-label required">Tipe Equipment</label>
                        <select class="form-select" id="tipe" required>
                            <option value="">Pilih Tipe</option>
                            <option value="pressure_vessel">Pressure Vessels (EHSF-402-02)</option>
                            <option value="heat_exchanger">Heat Exchangers (EHSF-402-03)</option>
                            <option value="piping">Piping Systems (EHSF-402-04)</option>
                            <option value="rotating">Rotating Equipment (EHSF-402-05)</option>
                            <option value="relief_systems">Relief and Vent Systems (EHSF-402-06)</option>
                            <option value="storage_tank">Storage Tanks (EHSF-402-07)</option>
                            <option value="fired_heater">Fired Heaters/Boilers (EHSF-402-08)</option>
                            <option value="electrical">Electrical Systems (EHSF-402-09)</option>
                            <option value="instrumentation">Instrumentation and Control (EHSF-402-10)</option>
                            <option value="reactors">Reactors (EHSF-402-11)</option>
                            <option value="columns_towers">Columns/Towers (EHSF-402-12)</option>
                            <option value="compressors">Compressors/Blowers (EHSF-402-13)</option>
                            <option value="cooling_towers">Cooling Towers (EHSF-402-14)</option>
                            <option value="utility_systems">Utility Systems (EHSF-402-15)</option>
                            <option value="safety_systems">Safety Systems (EHSF-402-16)</option>
                        </select>
                        <div class="alert alert-warning mt-2 py-2" style="background: #ffe28a; color: #666547; border: none;">
                            <i class="fas fa-exclamation-triangle"></i> 
                            <strong>Perhatian:</strong> Perubahan tipe akan mengubah struktur form PSI. Data PSI yang sudah diisi mungkin tidak sesuai dengan form baru.
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Lokasi Fisik</label>
                            <input type="text" class="form-control" id="lokasi_fisik" 
                                   placeholder="Contoh: Area CP Level 2">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tag Number / Serial Number</label>
                            <input type="text" class="form-control" id="tag_number" 
                                   placeholder="Contoh: SN-2024-001">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Manufacturer / Vendor</label>
                        <input type="text" class="form-control" id="manufacturer" 
                               placeholder="Contoh: PT. Indonesia Pressure Vessel">
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tahun Installasi</label>
                            <input type="number" class="form-control" id="tahun_installasi" 
                                   min="1900" max="2099" placeholder="2020">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tahun Manufacture</label>
                            <input type="number" class="form-control" id="tahun_manufacture" 
                                   min="1900" max="2099" placeholder="2019">
                        </div>
                    </div>

                    <hr>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning" id="submitBtn">
                            <i class="fas fa-save"></i> Update Equipment
                        </button>
                        <button type="button" class="btn btn-danger" id="deleteBtn">
                            <i class="fas fa-trash"></i> Hapus Equipment
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                            <i class="fas fa-times"></i> Batal
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // 🔥 KONFIGURASI FIREBASE - RTDB
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // Ambil equipment key dari URL (bukan equip_id)
        const urlParams = new URLSearchParams(window.location.search);
        const equipmentKey = urlParams.get('id');

        // Cek login
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else if (equipmentKey) {
                loadEquipmentData(equipmentKey);
            } else {
                alert('ID equipment tidak ditemukan');
                window.location.href = 'dashboard.html';
            }
        });

        // Load data equipment - FIXED untuk RTDB
        async function loadEquipmentData(key) {
            try {
                console.log('Loading equipment with key:', key);
                
                const snapshot = await database.ref('equipment/' + key).once('value');
                
                if (!snapshot.exists()) {
                    alert('Data tidak ditemukan');
                    window.location.href = 'dashboard.html';
                    return;
                }

                const data = snapshot.val();
                console.log('Equipment data:', data);
                
                // Isi form dengan data yang ada
                document.getElementById('equipmentKey').value = key;
                document.getElementById('originalEquipId').value = data.equip_id;
                document.getElementById('originalTipe').value = data.tipe || 'pressure_vessel';
                document.getElementById('equip_id').value = data.equip_id || '';
                document.getElementById('nama').value = data.nama || '';
                
                // Handle area
                const areaSelect = document.getElementById('area');
                const predefinedAreas = Array.from(areaSelect.options).map(opt => opt.value);
                
                if (data.area && !predefinedAreas.includes(data.area)) {
                    document.getElementById('area_lainnya').value = data.area;
                    document.getElementById('areaLainnyaDiv').style.display = 'block';
                    areaSelect.value = 'Lainnya';
                } else {
                    areaSelect.value = data.area || '';
                }
                
                document.getElementById('kategori').value = data.kategori || '';
                document.getElementById('is_critical').checked = data.kategori === 1;
                
                // Handle kustodian
                const kustodianSelect = document.getElementById('kustodian');
                const predefinedKustodians = Array.from(kustodianSelect.options).map(opt => opt.value);
                
                if (data.kustodian && !predefinedKustodians.includes(data.kustodian)) {
                    document.getElementById('kustodian_lainnya').value = data.kustodian;
                    document.getElementById('kustodianLainnyaDiv').style.display = 'block';
                    kustodianSelect.value = 'Lainnya';
                } else {
                    kustodianSelect.value = data.kustodian || '';
                }
                
                // Handle tipe equipment
                document.getElementById('tipe').value = data.tipe || '';
                
                document.getElementById('lokasi_fisik').value = data.lokasi_fisik || '';
                document.getElementById('tag_number').value = data.tag_number || '';
                document.getElementById('manufacturer').value = data.manufacturer || '';
                document.getElementById('tahun_installasi').value = data.tahun_installasi || '';
                document.getElementById('tahun_manufacture').value = data.tahun_manufacture || '';
                
                // Sembunyikan loading, tampilkan form
                document.getElementById('loadingDiv').style.display = 'none';
                document.getElementById('equipmentForm').style.display = 'block';
                
            } catch (error) {
                console.error('Error loading data:', error);
                showAlert('Gagal memuat data: ' + error.message, 'danger');
            }
        }

        // Toggle area lainnya
        document.getElementById('area').addEventListener('change', function() {
            const areaLainnyaDiv = document.getElementById('areaLainnyaDiv');
            if (this.value === 'Lainnya') {
                areaLainnyaDiv.style.display = 'block';
            } else {
                areaLainnyaDiv.style.display = 'none';
                document.getElementById('area_lainnya').value = '';
            }
        });

        // Toggle kustodian lainnya
        document.getElementById('kustodian').addEventListener('change', function() {
            const kustodianLainnyaDiv = document.getElementById('kustodianLainnyaDiv');
            if (this.value === 'Lainnya') {
                kustodianLainnyaDiv.style.display = 'block';
            } else {
                kustodianLainnyaDiv.style.display = 'none';
                document.getElementById('kustodian_lainnya').value = '';
            }
        });

        // Auto-set is_critical
        document.getElementById('kategori').addEventListener('change', function() {
            document.getElementById('is_critical').checked = (this.value === '1');
        });

        // Handle update - FIXED untuk RTDB
        document.getElementById('equipmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Mengupdate...';

            const key = document.getElementById('equipmentKey').value;
            const originalEquipId = document.getElementById('originalEquipId').value;
            const newEquipId = document.getElementById('equip_id').value.trim();
            const originalTipe = document.getElementById('originalTipe').value;
            const newTipe = document.getElementById('tipe').value;

            // Ambil nilai form
            let area = document.getElementById('area').value;
            if (area === 'Lainnya') {
                area = document.getElementById('area_lainnya').value;
            }

            let kustodian = document.getElementById('kustodian').value;
            if (kustodian === 'Lainnya') {
                kustodian = document.getElementById('kustodian_lainnya').value;
            }

            try {
                // Cek jika equip_id berubah dan sudah ada yang pakai
                if (newEquipId !== originalEquipId) {
                    const existingSnapshot = await database.ref('equipment')
                        .orderByChild('equip_id')
                        .equalTo(newEquipId)
                        .once('value');
                    
                    if (existingSnapshot.exists()) {
                        showAlert('Equipment ID "' + newEquipId + '" sudah digunakan!', 'danger');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-save"></i> Update Equipment';
                        return;
                    }
                }

                // Jika tipe berubah, konfirmasi user
                if (originalTipe !== newTipe) {
                    const confirmChange = confirm(
                        `PERINGATAN: Anda mengubah tipe equipment dari "${getTipeLabel(originalTipe)}" ke "${getTipeLabel(newTipe)}".\n\n` +
                        `Data PSI yang sudah diisi mungkin tidak sesuai dengan struktur form baru.\n` +
                        `Apakah Anda yakin ingin melanjutkan?`
                    );
                    if (!confirmChange) {
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-save"></i> Update Equipment';
                        return;
                    }
                    
                    // Backup psi_data lama ke history
                    const psiSnapshot = await database.ref('psi_data/' + originalEquipId).once('value');
                    if (psiSnapshot.exists()) {
                        const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
                        await database.ref('psi_data_history/' + originalEquipId + '_' + timestamp).set(psiSnapshot.val());
                        console.log('PSI data backed up to history');
                    }
                    
                    // Reset psi_progress karena tipe berubah
                    await database.ref('equipment/' + key + '/psi_progress').set(0);
                    await database.ref('equipment/' + key + '/psi_wajib_progress').set(0);
                }

                // Data update
                const updateData = {
                    equip_id: newEquipId,
                    nama: document.getElementById('nama').value,
                    area: area,
                    kategori: parseInt(document.getElementById('kategori').value),
                    is_critical: document.getElementById('kategori').value === '1',
                    kustodian: kustodian,
                    tipe: newTipe,
                    lokasi_fisik: document.getElementById('lokasi_fisik').value || '',
                    tag_number: document.getElementById('tag_number').value || '',
                    manufacturer: document.getElementById('manufacturer').value || '',
                    tahun_installasi: document.getElementById('tahun_installasi').value ? parseInt(document.getElementById('tahun_installasi').value) : null,
                    tahun_manufacture: document.getElementById('tahun_manufacture').value ? parseInt(document.getElementById('tahun_manufacture').value) : null,
                    updated_at: new Date().toISOString(),
                    updated_by: auth.currentUser.email
                };

                // Update ke RTDB - menggunakan update() untuk tidak overwrite field lain
                await database.ref('equipment/' + key).update(updateData);
                
                // Jika equip_id berubah, update juga psi_data references
                if (newEquipId !== originalEquipId) {
                    // Pindahkan psi_data ke path baru
                    const psiSnapshot = await database.ref('psi_data/' + originalEquipId).once('value');
                    if (psiSnapshot.exists()) {
                        await database.ref('psi_data/' + newEquipId).set(psiSnapshot.val());
                        await database.ref('psi_data/' + originalEquipId).remove();
                    }
                }
                
                showAlert('Data berhasil diupdate!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
                
            } catch (error) {
                console.error('Error updating:', error);
                showAlert('Gagal mengupdate: ' + error.message, 'danger');
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Update Equipment';
            }
        });

        // Handle delete - FIXED untuk RTDB
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            const key = document.getElementById('equipmentKey').value;
            const equipId = document.getElementById('equip_id').value;
            
            if (!confirm(`Yakin ingin menghapus equipment ${equipId}?\n\nPERINGATAN: Semua data PSI untuk equipment ini juga akan dihapus!`)) {
                return;
            }
            
            try {
                // Hapus equipment
                await database.ref('equipment/' + key).remove();
                
                // Hapus juga psi_data untuk equipment ini
                await database.ref('psi_data/' + equipId).remove();
                
                alert('Equipment dan data PSI berhasil dihapus');
                window.location.href = 'dashboard.html';
            } catch (error) {
                console.error('Error deleting:', error);
                showAlert('Gagal menghapus: ' + error.message, 'danger');
            }
        });

        // Logout function
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        // Helper function
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            alertDiv.classList.remove('d-none');
        }

        // Helper untuk label tipe
        function getTipeLabel(tipe) {
            const labels = {
                'pressure_vessel': 'Pressure Vessel',
                'heat_exchanger': 'Heat Exchanger',
                'piping': 'Piping',
                'rotating': 'Rotating',
                'relief_systems': 'Relief System',
                'storage_tank': 'Storage Tank',
                'fired_heater': 'Fired Heater',
                'electrical': 'Electrical',
                'instrumentation': 'Instrumentation',
                'reactors': 'Reactor',
                'columns_towers': 'Column/Tower',
                'compressors': 'Compressor',
                'cooling_towers': 'Cooling Tower',
                'utility_systems': 'Utility',
                'safety_systems': 'Safety System'
            };
            return labels[tipe] || tipe || '-';
        }
    </script>
</body>
</html>
