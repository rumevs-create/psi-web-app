<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management
            </span>
            <button class="btn btn-light" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row" id="summaryCards">
            <div class="col-md-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5>Total Equipment</h5>
                        <h2 id="totalEquip">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger text-white">
                    <div class="card-body">
                        <h5>Kategori 1</h5>
                        <h2 id="kategori1">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5>PSI Complete</h5>
                        <h2 id="psiComplete">0%</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5>Need Update</h5>
                        <h2 id="needUpdate">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4">
            <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Daftar Equipment</h5>
    <button class="btn btn-success btn-sm" onclick="window.location.href='tambah-equipment.html'">
        <i class="fas fa-plus"></i> Tambah Equipment
    </button>
</div>
            <table class="table table-striped" id="equipmentTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nama</th>
                            <th>Area</th>
                            <th>Kategori</th>
                            <th>Kustodian</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="equipmentList">
                        <tr><td colspan="6" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <script>
        // 🔥 KONFIGURASI FIREBASE - PASTE ASLI DARI FIREBASE ANDA!
const firebaseConfig = {
    apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
    authDomain: "psi-management-system.firebaseapp.com",
    projectId: "psi-management-system",
    storageBucket: "psi-management-system.firebasestorage.app",
    messagingSenderId: "1053490628908",
    appId: "1:1053490628908:web:6b272409217851f8ebc489"
};

        // Initialize Firebase (CUKUP SEKALI!)
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Cek login
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                loadData();
            }
        });

        function loadData() {
            // Load summary
            db.collection('text').get().then((snapshot) => {
                const total = snapshot.size;
                let kat1 = 0;
                
                snapshot.forEach(doc => {
                    if (doc.data().kategori === 1) kat1++;
                });
                
                document.getElementById('totalEquip').textContent = total;
                document.getElementById('kategori1').textContent = kat1;
                document.getElementById('psiComplete').textContent = '75%'; // Sementara
                
                // Load table
                let html = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    html += `
                        <tr>
                            <td>${data.equip_id}</td>
                            <td>${data.nama}</td>
                            <td>${data.area}</td>
                            <td><span class="badge bg-${data.kategori === 1 ? 'danger' : 'secondary'}">Kat ${data.kategori}</span></td>
                            <td>${data.kustodian}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="viewDetail('${doc.id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
                document.getElementById('equipmentList').innerHTML = html;
            });
        }

        function viewDetail(id) {
            window.location.href = `detail.html?id=${id}`;
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>

</html>
