<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
            
            --card-1: #666547;
            --card-2: #fb2e01;
            --card-3: #6fcb9f;
            --card-4: #ffe28a;
        }

        body {
            background: #fffeb3;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 101, 71, 0.15);
            transition: all 0.3s ease;
        }

        .summary-card {
            position: relative;
            overflow: hidden;
            border: none;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.5s ease;
        }

        .summary-card:hover::before {
            transform: scale(3);
        }

        .summary-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(102, 101, 71, 0.2);
        }

        .bg-card-1 { background-color: var(--card-1) !important; }
        .bg-card-2 { background-color: var(--card-2) !important; }
        .bg-card-3 { background-color: var(--card-3) !important; }
        .bg-card-4 { background-color: var(--card-4) !important; color: #666547 !important; }

        .bg-card-4 .opacity-75 {
            color: #666547;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(102, 101, 71, 0.1);
        }

        .navbar {
            background-color: #666547 !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
        }

        .btn-success {
            background-color: #6fcb9f;
            border: none;
            color: #fff;
        }

        .btn-success:hover {
            background-color: #5db88d;
            color: #fff;
        }

        .btn-light {
            background-color: #fffeb3;
            border: none;
            color: #666547;
        }

        .btn-light:hover {
            background-color: #ffe28a;
            color: #666547;
        }

        .table-dark {
            background-color: #666547 !important;
        }

        .table-dark th {
            border: none;
            font-weight: 500;
            background-color: #666547 !important;
        }

        .badge.bg-info {
            background-color: #6fcb9f !important;
            color: #fff;
        }

        .badge.bg-danger {
            background-color: #fb2e01 !important;
            color: #fff;
        }

        .badge.bg-secondary {
            background-color: #ffe28a !important;
            color: #666547;
        }

        .text-primary {
            color: #666547 !important;
        }

        .form-control:focus {
            border-color: #6fcb9f;
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        .input-group-text {
            background-color: #fffeb3;
            border: 1px solid #ffe28a;
            color: #666547;
        }

        .form-control {
            border: 1px solid #ffe28a;
        }

        .btn-outline-primary {
            color: #666547;
            border-color: #666547;
        }

        .btn-outline-primary:hover {
            background-color: #666547;
            border-color: #666547;
            color: #fffeb3;
        }

        .btn-outline-danger {
            color: #fb2e01;
            border-color: #fb2e01;
        }

        .btn-outline-danger:hover {
            background-color: #fb2e01;
            border-color: #fb2e01;
            color: #fff;
        }

        h5, h6 {
            font-weight: 600;
            color: #666547;
        }

        .card-title {
            color: inherit;
        }

        /* Modal Custom Styling */
        .modal-content {
            border-radius: 15px;
            border: none;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #6fcb9f, #5db88d);
            color: white;
            border-radius: 15px 15px 0 0;
            border-bottom: none;
        }

        .modal-title {
            font-weight: 600;
        }

        .modal-body {
            padding: 0;
        }

        .detail-section {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }

        .detail-section:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 1rem;
            color: #111827;
            font-weight: 500;
        }

        .detail-value.code {
            font-family: 'Courier New', monospace;
            background: #f3f4f6;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
        }

        .detail-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .detail-badge.critical {
            background: #fee2e2;
            color: #991b1b;
        }

        .detail-badge.standard {
            background: #d1fae5;
            color: #065f46;
        }

        .progress-container {
            background: #f3f4f6;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
        }

        .progress {
            height: 12px;
            border-radius: 6px;
            background: #e5e7eb;
        }

        .progress-bar {
            border-radius: 6px;
        }

        .btn-close-white {
            filter: brightness(0) invert(1);
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,254,179,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #6fcb9f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-box {
            background: #fee2e2;
            border: 1px solid #fb2e01;
            color: #991b1b;
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            text-align: center;
        }

        .retry-btn {
            background: #fb2e01;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 15px;
            cursor: pointer;
        }

        .retry-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner mb-3"></div>
        <p class="text-muted" id="loadingText">Menghubungkan ke database...</p>
    </div>

    <!-- Error Overlay (hidden by default) -->
    <div id="errorOverlay" class="loading-overlay" style="display: none;">
        <div class="error-box">
            <i class="fas fa-exclamation-circle fa-3x mb-3"></i>
            <h4>Terjadi Kesalahan</h4>
            <p id="errorMessage">Gagal memuat data</p>
            <button class="retry-btn" onclick="location.reload()">
                <i class="fas fa-redo"></i> Coba Lagi
            </button>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-info-circle me-2"></i>Detail Equipment</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    <!-- Content will be injected here -->
                </div>
                <div class="modal-footer" style="border-top: 1px solid #e5e7eb;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                    <button type="button" class="btn btn-success" onclick="editCurrentEquipment()">
                        <i class="fas fa-edit me-1"></i>Edit Equipment
                    </button>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management
            </span>
            <div>
                <button class="btn btn-success me-2" onclick="window.location.href='tambah-equipment.html'">
                    <i class="fas fa-plus"></i> Tambah Equipment
                </button>
                <button class="btn btn-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Summary Cards -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card text-white summary-card bg-card-1">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">Total Equipment</h6>
                                <h2 class="mb-0" id="totalEquip">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="fas fa-cubes fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white summary-card bg-card-2">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">Kategori 1 (Critical)</h6>
                                <h2 class="mb-0" id="kategori1">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="fas fa-exclamation-triangle fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card text-white summary-card bg-card-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">PSI Complete</h6>
                                <h2 class="mb-0" id="psiComplete">0%</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="fas fa-check-circle fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card summary-card bg-card-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title mb-2 opacity-75">Need Update</h6>
                                <h2 class="mb-0" id="needUpdate">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-50 rounded-circle p-3">
                                <i class="fas fa-clock fa-2x"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Equipment Table -->
        <div class="table-container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="mb-0">
                    <i class="fas fa-list text-primary"></i> Daftar Equipment
                </h5>
                <div class="input-group" style="width: 300px;">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" 
                           placeholder="Cari equipment..." onkeyup="searchEquipment()">
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th class="rounded-start">Equipment ID</th>
                            <th>Nama</th>
                            <th>Area</th>
                            <th>Kategori</th>
                            <th>Kustodian</th>
                            <th>Progress PSI</th>
                            <th class="rounded-end">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="equipmentList">
                        <tr>
                            <td colspan="7" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-3 text-muted">Memuat data equipment...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // KONFIGURASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        // Global variables
        let db, auth;
        let allEquipment = [];
        let unsubscribe = null;
        let currentEquipmentId = null;
        let detailModal = null;

        // Initialize
        function initializeApp() {
            try {
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase SDK tidak ter-load');
                }

                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();

                // Initialize modal
                detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

                setupAuthListener();
            } catch (error) {
                console.error('Initialization error:', error);
                showError('Gagal inisialisasi: ' + error.message);
            }
        }

        function setupAuthListener() {
            auth.onAuthStateChanged((user) => {
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                
                console.log('User logged in:', user.email);
                setTimeout(() => {
                    loadData();
                }, 500);
            }, (error) => {
                showError('Gagal autentikasi: ' + error.message);
            });
        }

        function loadData() {
            document.getElementById('loadingText').textContent = 'Mengambil data equipment...';

            try {
                if (!db) {
                    throw new Error('Database tidak tersedia');
                }

                unsubscribe = db.collection('equipment')
                    .orderBy('created_at', 'desc')
                    .onSnapshot(
                        (snapshot) => {
                            console.log('Data received:', snapshot.size, 'documents');
                            
                            allEquipment = [];
                            snapshot.forEach((doc) => {
                                allEquipment.push({
                                    id: doc.id,
                                    ...doc.data()
                                });
                            });
                            
                            renderTable(allEquipment);
                            updateSummary(allEquipment);
                            hideLoading();
                        },
                        (error) => {
                            console.error('Firestore error:', error);
                            showError('Gagal memuat data: ' + error.message);
                        }
                    );

            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        function renderTable(equipmentList) {
            const tbody = document.getElementById('equipmentList');
            
            if (equipmentList.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-5 text-muted">
                            <i class="fas fa-inbox fa-3x mb-3 opacity-25"></i>
                            <p class="fs-5">Tidak ada equipment</p>
                            <button class="btn btn-success mt-2" onclick="window.location.href='tambah-equipment.html'">
                                <i class="fas fa-plus"></i> Tambah Equipment Baru
                            </button>
                        </td>
                    </tr>
                `;
                return;
            }

            let html = '';
            equipmentList.forEach((data) => {
                const kategoriBadge = data.kategori === 1 
                    ? '<span class="badge bg-danger">Critical</span>'
                    : `<span class="badge bg-secondary">Kat ${data.kategori}</span>`;
                
                const progressBar = renderProgressBar(data.psi_progress);
                const tipeLabel = getTipeLabel(data.tipe);
                
                html += `
                    <tr>
                        <td><strong class="text-primary">${data.equip_id || '-'}</strong></td>
                        <td>
                            <div class="fw-semibold">${data.nama || '-'}</div>
                            <small class="text-muted"><i class="fas fa-tag me-1"></i>${tipeLabel}</small>
                        </td>
                        <td><span class="badge bg-info">${data.area || '-'}</span></td>
                        <td>${kategoriBadge}</td>
                        <td>${data.kustodian || '-'}</td>
                        <td style="width: 160px;">${progressBar}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${data.id}')" 
                                        title="Lihat Detail">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteEquipment('${data.id}', '${data.equip_id || ''}')" 
                                        title="Hapus">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }

        function viewDetail(id) {
            const eq = allEquipment.find(e => e.id === id);
            if (!eq) return;

            currentEquipmentId = id;
            
            const isCritical = eq.kategori === 1;
            const progress = eq.psi_progress || 0;
            
            let barColor = '#666547';
            if (progress >= 80) barColor = '#6fcb9f';
            else if (progress >= 50) barColor = '#ffe28a';
            else if (progress >= 30) barColor = '#fb2e01';

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <!-- Header Info -->
                <div class="detail-section">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <div class="detail-label">Equipment ID</div>
                            <div class="detail-value code">${eq.equip_id || '-'}</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="detail-label">Status Kategori</div>
                            <div class="detail-value">
                                <span class="detail-badge ${isCritical ? 'critical' : 'standard'}">
                                    <i class="fas ${isCritical ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i>
                                    ${isCritical ? 'EHS Critical (Kategori 1)' : `Kategori ${eq.kategori}`}
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3">
                        <div class="detail-label">Nama Equipment</div>
                        <div class="detail-value fs-4">${eq.nama || '-'}</div>
                    </div>
                </div>

                <!-- Location & Type -->
                <div class="detail-section">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <div class="detail-label"><i class="fas fa-map-marker-alt me-1"></i>Area</div>
                            <div class="detail-value">${eq.area || '-'}</div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="detail-label"><i class="fas fa-tag me-1"></i>Tipe</div>
                            <div class="detail-value">${getTipeLabel(eq.tipe)}</div>
                        </div>
                        <div class="col-md-4 mb-3">
                            <div class="detail-label"><i class="fas fa-user me-1"></i>Kustodian</div>
                            <div class="detail-value">${eq.kustodian || '-'}</div>
                        </div>
                    </div>
                    ${eq.lokasi_fisik ? `
                    <div class="mt-2">
                        <div class="detail-label"><i class="fas fa-location-arrow me-1"></i>Lokasi Fisik</div>
                        <div class="detail-value">${eq.lokasi_fisik}</div>
                    </div>
                    ` : ''}
                </div>

                <!-- Technical Specs -->
                ${(eq.tag_number || eq.manufacturer || eq.tahun_installasi) ? `
                <div class="detail-section">
                    <h6 class="mb-3 text-muted"><i class="fas fa-cogs me-2"></i>Spesifikasi Teknis</h6>
                    <div class="row">
                        ${eq.tag_number ? `
                        <div class="col-md-4 mb-3">
                            <div class="detail-label">Tag Number</div>
                            <div class="detail-value code">${eq.tag_number}</div>
                        </div>
                        ` : ''}
                        ${eq.manufacturer ? `
                        <div class="col-md-4 mb-3">
                            <div class="detail-label">Manufacturer</div>
                            <div class="detail-value">${eq.manufacturer}</div>
                        </div>
                        ` : ''}
                        ${eq.tahun_installasi ? `
                        <div class="col-md-4 mb-3">
                            <div class="detail-label">Tahun Installasi</div>
                            <div class="detail-value">${eq.tahun_installasi}</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
                ` : ''}

                <!-- Progress -->
                <div class="progress-container">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="fw-semibold">PSI Completion Progress</span>
                        <span class="fw-bold" style="color: ${barColor}; font-size: 1.25rem;">${progress}%</span>
                    </div>
                    <div class="progress">
                        <div class="progress-bar" role="progressbar" 
                             style="width: ${progress}%; background-color: ${barColor};"></div>
                    </div>
                    <small class="text-muted mt-2 d-block">
                        ${progress === 100 ? '✓ Semua dokumen PSI telah lengkap' : '⚠ Masih ada dokumen yang perlu dilengkapi'}
                    </small>
                </div>
            `;

            detailModal.show();
        }

        function editCurrentEquipment() {
            if (currentEquipmentId) {
                window.location.href = `edit-equipment.html?id=${currentEquipmentId}`;
            }
        }

        function updateSummary(equipmentList) {
            const total = equipmentList.length;
            const kat1 = equipmentList.filter(e => e.kategori === 1).length;
            
            let totalProgress = 0;
            equipmentList.forEach(e => {
                totalProgress += (e.psi_progress || 0);
            });
            const avgProgress = total > 0 ? Math.round(totalProgress / total) : 0;
            
            const needUpdate = equipmentList.filter(e => (e.psi_progress || 0) < 100).length;
            
            document.getElementById('totalEquip').textContent = total;
            document.getElementById('kategori1').textContent = kat1;
            document.getElementById('psiComplete').textContent = avgProgress + '%';
            document.getElementById('needUpdate').textContent = needUpdate;
        }

        function searchEquipment() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allEquipment.filter(e => 
                (e.equip_id || '').toLowerCase().includes(searchTerm) ||
                (e.nama || '').toLowerCase().includes(searchTerm) ||
                (e.area || '').toLowerCase().includes(searchTerm) ||
                (e.kustodian || '').toLowerCase().includes(searchTerm)
            );
            renderTable(filtered);
        }

        function deleteEquipment(id, equipId) {
            if (!confirm(`Yakin ingin menghapus equipment ${equipId || id}?`)) return;
            
            db.collection('equipment').doc(id).delete()
                .then(() => {
                    console.log('Equipment deleted:', id);
                })
                .catch((error) => {
                    alert('Gagal menghapus: ' + error.message);
                });
        }

        function logout() {
            if (unsubscribe) {
                unsubscribe();
            }
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        function getTipeLabel(tipe) {
            const labels = {
                'pressure_vessel': 'Pressure Vessel',
                'heat_exchanger': 'Heat Exchanger',
                'piping': 'Piping',
                'rotating': 'Rotating',
                'relief_systems': 'Relief System',
                'storage_tank': 'Storage Tank',
                'fired_heater': 'Fired Heater',
                'electrical': 'Electrical',
                'instrumentation': 'Instrumentation',
                'reactors': 'Reactor',
                'columns_towers': 'Column/Tower',
                'compressors': 'Compressor',
                'cooling_towers': 'Cooling Tower',
                'utility_systems': 'Utility',
                'safety_systems': 'Safety System'
            };
            return labels[tipe] || tipe || '-';
        }

        function renderProgressBar(progress) {
            const pct = progress || 0;
            
            let barColor = '#666547';
            if (pct >= 80) barColor = '#6fcb9f';
            else if (pct >= 50) barColor = '#ffe28a';
            else if (pct >= 30) barColor = '#fb2e01';
            
            return `
                <div class="d-flex align-items-center">
                    <div class="progress flex-grow-1" style="height: 10px; border-radius: 5px; background: #fffeb3;">
                        <div class="progress-bar" role="progressbar" 
                             style="width: ${pct}%; border-radius: 5px; background-color: ${barColor};"></div>
                    </div>
                    <span class="ms-2 small fw-bold" style="color: #666547;">${pct}%</span>
                </div>
            `;
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function showError(message) {
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorOverlay').style.display = 'flex';
        }

        // Start
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
