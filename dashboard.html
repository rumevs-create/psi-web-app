<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PSI Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body {
            background: var(--color-cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: var(--color-olive) !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 1.3rem;
        }

        .btn-mint {
            background-color: var(--color-mint);
            border: none;
            color: white;
            font-weight: 500;
        }

        .btn-mint:hover {
            background-color: #5db88d;
            color: white;
        }

        .btn-light-custom {
            background-color: white;
            border: none;
            color: var(--color-olive);
            font-weight: 500;
        }

        .btn-light-custom:hover {
            background-color: var(--color-yellow);
            color: var(--color-olive);
        }

        /* Summary Cards */
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            height: 100%;
            border-left: 4px solid;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card.total { border-left-color: #6c9bcf; }
        .stat-card.aktif { border-left-color: var(--color-mint); }
        .stat-card.progress { border-left-color: var(--color-yellow); }
        .stat-card.critical { border-left-color: var(--color-red); }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-olive);
            margin-bottom: 5px;
        }

        .stat-label {
            color: #888;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            opacity: 0.8;
        }

        .stat-card.total .stat-icon { background: #e8f0fe; color: #6c9bcf; }
        .stat-card.aktif .stat-icon { background: #d4edda; color: var(--color-mint); }
        .stat-card.progress .stat-icon { background: #fff3cd; color: var(--color-yellow); }
        .stat-card.critical .stat-icon { background: #f8d7da; color: var(--color-red); }

        /* Equipment Cards */
        .equipment-section {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-top: 30px;
        }

        .section-header {
            background: var(--color-mint);
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header h5 {
            margin: 0;
            font-weight: 600;
        }

        .equipment-card {
            padding: 25px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }

        .equipment-card:hover {
            background-color: #fafafa;
        }

        .equipment-card:last-child {
            border-bottom: none;
        }

        .badge-category {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-standard {
            background-color: var(--color-mint);
            color: white;
        }

        .badge-critical {
            background-color: var(--color-red);
            color: white;
        }

        .equipment-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #333;
            margin: 10px 0 5px 0;
        }

        .equipment-id {
            color: #2e7d9c;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 0.95rem;
            color: #333;
            font-weight: 500;
        }

        .progress-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .progress {
            flex: 1;
            height: 8px;
            background-color: #e9ecef;
            border-radius: 10px;
        }

        .progress-bar {
            background-color: var(--color-mint);
            border-radius: 10px;
        }

        .progress-text {
            font-size: 0.9rem;
            color: #666;
            font-weight: 600;
            min-width: 40px;
            text-align: right;
        }

        .btn-view-all {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-view-all:hover {
            background: rgba(255,255,255,0.3);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        @media (max-width: 768px) {
            .info-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center">
                <span class="navbar-brand me-4">
                    <i class="fas fa-shield-alt me-2"></i>PSI Management System
                </span>
                <a href="dashboard.html" class="btn btn-mint btn-sm">
                    <i class="fas fa-home me-1"></i> Dashboard
                </a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-light" id="userEmail"></span>
                <button class="btn btn-light-custom btn-sm" onclick="logout()">
                    <i class="fas fa-sign-out-alt me-1"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4 py-4">
        <!-- Summary Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-3 col-sm-6">
                <div class="stat-card total">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-number" id="totalEquip">0</div>
                            <div class="stat-label">Total Equipment</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-cubes"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card aktif">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-number" id="equipmentAktif">0</div>
                            <div class="stat-label">Equipment Aktif</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card progress">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-number" id="dalamProgress">0</div>
                            <div class="stat-label">Dalam Progres PSI</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-tasks"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 col-sm-6">
                <div class="stat-card critical">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-number" id="ehsCritical">0</div>
                            <div class="stat-label">EHS Critical</div>
                        </div>
                        <div class="stat-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Equipment List Section -->
        <div class="equipment-section">
            <div class="section-header">
                <h5><i class="fas fa-clock me-2"></i>Equipment Terbaru</h5>
                <div class="d-flex gap-2">
                    <button class="btn btn-light-custom btn-sm" onclick="window.location.href='tambah-equipment.html'">
                        <i class="fas fa-plus me-1"></i> Tambah Equipment
                    </button>
                    <button class="btn-view-all" onclick="viewAllEquipment()">
                        Lihat Semua <i class="fas fa-arrow-right ms-1"></i>
                    </button>
                </div>
            </div>
            
            <div id="equipmentList">
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <h5>Tidak ada equipment</h5>
                    <p class="mb-3">Belum ada data equipment yang tersimpan</p>
                    <button class="btn btn-mint" onclick="window.location.href='tambah-equipment.html'">
                        <i class="fas fa-plus me-1"></i> Tambah Equipment Baru
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let allEquipment = [];

        // Check auth
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else {
                document.getElementById('userEmail').textContent = user.email;
                loadData();
            }
        });

        function loadData() {
            const equipmentRef = database.ref('equipment');
            equipmentRef.on('value', (snapshot) => {
                const data = snapshot.val() || {};
                allEquipment = Object.keys(data).map(key => ({
                    key: key,
                    ...data[key]
                }));
                
                updateStats(allEquipment);
                renderEquipmentList(allEquipment.slice(0, 5)); // Show latest 5
            });
        }

        function updateStats(equipment) {
            const total = equipment.length;
            const aktif = equipment.filter(e => e.psi_progress > 0).length;
            const inProgress = equipment.filter(e => e.psi_progress > 0 && e.psi_progress < 100).length;
            const critical = equipment.filter(e => e.kategori === 1).length;

            document.getElementById('totalEquip').textContent = total;
            document.getElementById('equipmentAktif').textContent = aktif;
            document.getElementById('dalamProgress').textContent = inProgress;
            document.getElementById('ehsCritical').textContent = critical;
        }

        function renderEquipmentList(equipment) {
            const container = document.getElementById('equipmentList');
            
            if (equipment.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h5>Tidak ada equipment</h5>
                        <p class="mb-3">Belum ada data equipment yang tersimpan</p>
                        <button class="btn btn-mint" onclick="window.location.href='tambah-equipment.html'">
                            <i class="fas fa-plus me-1"></i> Tambah Equipment Baru
                        </button>
                    </div>
                `;
                return;
            }

            let html = '';
            equipment.forEach((data) => {
                const isCritical = data.kategori === 1;
                const badgeClass = isCritical ? 'badge-critical' : 'badge-standard';
                const badgeText = isCritical ? 'EHS Critical' : 'Standard';
                const progress = data.psi_progress || 0;

                html += `
                    <div class="equipment-card">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="badge-category ${badgeClass}">${badgeText}</span>
                                <h4 class="equipment-title">${data.nama}</h4>
                                <div class="equipment-id">${data.equip_id}</div>
                            </div>
                            <div class="text-end">
                                <div class="mb-2" style="color: #888; font-size: 0.85rem;">PSI Progress</div>
                                <div class="d-flex align-items-center gap-2">
                                    <div style="width: 100px;">
                                        <div class="progress">
                                            <div class="progress-bar" style="width: ${progress}%"></div>
                                        </div>
                                    </div>
                                    <span class="progress-text">${progress}%</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">Area</span>
                                <span class="info-value">${data.area || '-'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Kategori</span>
                                <span class="info-value">Kategori ${data.kategori || '-'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Kustodian</span>
                                <span class="info-value">${data.kustodian || '-'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Tipe</span>
                                <span class="info-value">${getTipeLabel(data.tipe)}</span>
                            </div>
                        </div>

                        <div class="mt-3 d-flex gap-2">
                            <button class="btn btn-sm btn-outline-primary" onclick="viewDetail('${data.equip_id}')">
                                <i class="fas fa-eye me-1"></i> Detail
                            </button>
                            <button class="btn btn-sm btn-outline-warning" onclick="editEquipment('${data.key}')">
                                <i class="fas fa-edit me-1"></i> Edit
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function getTipeLabel(tipe) {
            const labels = {
                'pressure_vessel': 'Pressure Vessel',
                'heat_exchanger': 'Heat Exchanger',
                'piping': 'Piping',
                'rotating': 'Rotating',
                'relief_systems': 'Relief System',
                'storage_tank': 'Storage Tank',
                'fired_heater': 'Fired Heater',
                'electrical': 'Electrical',
                'instrumentation': 'Instrumentation',
                'reactors': 'Reactor',
                'columns_towers': 'Column/Tower',
                'compressors': 'Compressor',
                'cooling_towers': 'Cooling Tower',
                'utility_systems': 'Utility',
                'safety_systems': 'Safety System'
            };
            return labels[tipe] || tipe || '-';
        }

        function viewDetail(equipId) {
            window.location.href = `detail.html?id=${equipId}`;
        }

        function editEquipment(key) {
            window.location.href = `edit-equipment.html?id=${key}`;
        }

        function viewAllEquipment() {
            // Could expand to show all or navigate to full list
            alert('Fitur lihat semua equipment - bisa ditambahkan tabel lengkap di sini');
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
