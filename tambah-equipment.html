<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Equipment - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body {
            background: #fffeb3;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .navbar {
            background-color: #666547 !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 101, 71, 0.15);
        }

        .card-header {
            background-color: #6fcb9f !important;
            color: #fff !important;
            border-bottom: none;
            border-radius: 15px 15px 0 0 !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #6fcb9f;
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        .form-control, .form-select {
            border: 1px solid #ffe28a;
        }

        .btn-primary {
            background-color: #6fcb9f;
            border: none;
        }

        .btn-primary:hover {
            background-color: #5db88d;
        }

        .btn-secondary {
            background-color: #666547;
            border: none;
        }

        .btn-secondary:hover {
            background-color: #55543d;
        }

        .form-check-input:checked {
            background-color: #6fcb9f;
            border-color: #6fcb9f;
        }

        .alert-success {
            background-color: #6fcb9f;
            color: #fff;
            border: none;
        }

        .alert-danger {
            background-color: #fb2e01;
            color: #fff;
            border: none;
        }

        .text-danger {
            color: #fb2e01 !important;
        }

        .form-text {
            color: #666547;
        }

        .text-muted {
            color: #666547 !important;
            opacity: 0.7;
        }

        .form-label {
            color: #666547;
            font-weight: 500;
        }

        hr {
            border-color: #ffe28a;
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management - Tambah Equipment
            </span>
            <div>
                <button class="btn btn-light me-2" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                <button class="btn btn-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-5 form-container">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Tambah Equipment Baru</h5>
            </div>
            <div class="card-body">
                <div id="alertMessage" class="alert d-none"></div>
                
                <form id="equipmentForm">
                    <!-- Equipment ID -->
                    <div class="mb-3">
                        <label class="form-label">Equipment ID <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="equip_id" required 
                               placeholder="Contoh: V-1101">
                    </div>

                    <!-- Nama Equipment -->
                    <div class="mb-3">
                        <label class="form-label">Nama Equipment <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="nama" required 
                               placeholder="Contoh: PTA Slurry Vessel">
                    </div>

                    <!-- Area -->
                    <div class="mb-3">
                        <label class="form-label">Area <span class="text-danger">*</span></label>
                        <select class="form-control" id="area" required>
                            <option value="">Pilih Area</option>
                            <option value="CP-1100">CP-1100</option>
                            <option value="CP-1200">CP-1200</option>
                            <option value="CP-1300">CP-1300</option>
                            <option value="CP-1400">CP-1400</option>
                            <option value="Utility-5300">Utility-5300</option>
                            <option value="Utility-6000">Utility-6000</option>
                            <option value="Utility-6300">Utility-6300</option>
                            <option value="SSP-1700">SSP-1700</option>
                            <option value="SSP-1800">SSP-1800</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <!-- Area Lainnya (muncul jika pilih Lainnya) -->
                    <div class="mb-3" id="areaLainnyaDiv" style="display: none;">
                        <label class="form-label">Area (Lainnya)</label>
                        <input type="text" class="form-control" id="area_lainnya" 
                               placeholder="Masukkan nama area">
                    </div>

                    <!-- Kategori -->
                    <div class="mb-3">
                        <label class="form-label">Kategori <span class="text-danger">*</span></label>
                        <select class="form-control" id="kategori" required>
                            <option value="">Pilih Kategori</option>
                            <option value="1">Kategori 1 (EHS Critical)</option>
                            <option value="2">Kategori 2 (Non-Critical)</option>
                            <option value="3">Kategori 3 (Valued)</option>
                        </select>
                    </div>

                    <!-- Is Critical? (otomatis berdasarkan kategori) -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="is_critical" disabled>
                        <label class="form-check-label" style="color: #666547;">EHS Critical Equipment</label>
                        <small class="text-muted d-block">(Otomatis Ya jika Kategori 1)</small>
                    </div>

                    <!-- Kustodian -->
                    <div class="mb-3">
                        <label class="form-label">Kustodian <span class="text-danger">*</span></label>
                        <select class="form-control" id="kustodian" required>
                            <option value="">Pilih Kustodian</option>
                            <option value="Process Engineer">Process Engineer</option>
                            <option value="Maintenance Engineer">Maintenance Engineer</option>
                            <option value="Mechanical Engineer">Mechanical Engineer</option>
                            <option value="EHS Engineer">EHS Engineer</option>
                            <option value="Instrument Engineer">Instrument Engineer</option>
                            <option value="Electrical Engineer">Electrical Engineer</option>
                            <option value="Utility Supervisor">Utility Supervisor</option>
                            <option value="Document Control">Document Control</option>
                            <option value="Lainnya">Lainnya</option>
                        </select>
                    </div>

                    <!-- Kustodian Lainnya -->
                    <div class="mb-3" id="kustodianLainnyaDiv" style="display: none;">
                        <label class="form-label">Kustodian (Lainnya)</label>
                        <input type="text" class="form-control" id="kustodian_lainnya" 
                               placeholder="Masukkan nama kustodian">
                    </div>

                    <!-- Tipe Equipment - DIUPDATE -->
                    <div class="mb-3">
                        <label class="form-label">Tipe Equipment <span class="text-danger">*</span></label>
                        <select class="form-control" id="tipe" required>
                            <option value="">Pilih Tipe Equipment</option>
                            <option value="pressure_vessel">Pressure Vessels (EHSF-402-02)</option>
                            <option value="heat_exchanger">Heat Exchangers (EHSF-402-03)</option>
                            <option value="piping">Piping Systems (EHSF-402-04)</option>
                            <option value="rotating">Rotating Equipment (EHSF-402-05)</option>
                            <option value="relief_systems">Relief and Vent Systems (EHSF-402-06)</option>
                            <option value="storage_tank">Storage Tanks (EHSF-402-07)</option>
                            <option value="fired_heater">Fired Heaters/Boilers (EHSF-402-08)</option>
                            <option value="electrical">Electrical Systems (EHSF-402-09)</option>
                            <option value="instrumentation">Instrumentation and Control (EHSF-402-10)</option>
                            <option value="reactors">Reactors (EHSF-402-11)</option>
                            <option value="columns_towers">Columns/Towers (EHSF-402-12)</option>
                            <option value="compressors">Compressors/Blowers (EHSF-402-13)</option>
                            <option value="cooling_towers">Cooling Towers (EHSF-402-14)</option>
                            <option value="utility_systems">Utility Systems (EHSF-402-15)</option>
                            <option value="safety_systems">Safety Systems (EHSF-402-16)</option>
                        </select>
                        <small class="text-muted">Tipe ini menentukan form PSI yang akan digunakan</small>
                    </div>

                    <!-- Lokasi Fisik -->
                    <div class="mb-3">
                        <label class="form-label">Lokasi Fisik</label>
                        <input type="text" class="form-control" id="lokasi_fisik" 
                               placeholder="Contoh: Area CP Level 2">
                    </div>

                    <!-- Tag Number / Serial Number -->
                    <div class="mb-3">
                        <label class="form-label">Tag Number / Serial Number</label>
                        <input type="text" class="form-control" id="tag_number" 
                               placeholder="Contoh: SN-2024-001">
                    </div>

                    <!-- Manufacturer / Vendor -->
                    <div class="mb-3">
                        <label class="form-label">Manufacturer / Vendor</label>
                        <input type="text" class="form-control" id="manufacturer" 
                               placeholder="Contoh: PT. Indonesia Pressure Vessel">
                    </div>

                    <!-- Tahun Installasi & Manufacture -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tahun Installasi</label>
                            <input type="number" class="form-control" id="tahun_installasi" 
                                   min="1900" max="2099" placeholder="2020">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Tahun Manufacture</label>
                            <input type="number" class="form-control" id="tahun_manufacture" 
                                   min="1900" max="2099" placeholder="2019">
                        </div>
                    </div>

                    <hr>
                    
                    <!-- Tombol Submit -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            <i class="fas fa-save"></i> Simpan Equipment
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="window.location.href='dashboard.html'">
                            Batal
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // 🔥 KONFIGURASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Cek login
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            }
        });

        // Logout function
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }

        // Toggle area lainnya
        document.getElementById('area').addEventListener('change', function() {
            const areaLainnyaDiv = document.getElementById('areaLainnyaDiv');
            if (this.value === 'Lainnya') {
                areaLainnyaDiv.style.display = 'block';
                document.getElementById('area_lainnya').required = true;
            } else {
                areaLainnyaDiv.style.display = 'none';
                document.getElementById('area_lainnya').required = false;
            }
        });

        // Toggle kustodian lainnya
        document.getElementById('kustodian').addEventListener('change', function() {
            const kustodianLainnyaDiv = document.getElementById('kustodianLainnyaDiv');
            if (this.value === 'Lainnya') {
                kustodianLainnyaDiv.style.display = 'block';
                document.getElementById('kustodian_lainnya').required = true;
            } else {
                kustodianLainnyaDiv.style.display = 'none';
                document.getElementById('kustodian_lainnya').required = false;
            }
        });

        // Auto-set is_critical berdasarkan kategori
        document.getElementById('kategori').addEventListener('change', function() {
            const isCritical = document.getElementById('is_critical');
            if (this.value === '1') {
                isCritical.checked = true;
            } else {
                isCritical.checked = false;
            }
        });

        // Handle form submit
        document.getElementById('equipmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

            // Ambil nilai form
            let area = document.getElementById('area').value;
            if (area === 'Lainnya') {
                area = document.getElementById('area_lainnya').value;
            }

            let kustodian = document.getElementById('kustodian').value;
            if (kustodian === 'Lainnya') {
                kustodian = document.getElementById('kustodian_lainnya').value;
            }

            const equipmentData = {
                equip_id: document.getElementById('equip_id').value,
                nama: document.getElementById('nama').value,
                area: area,
                kategori: parseInt(document.getElementById('kategori').value),
                is_critical: document.getElementById('kategori').value === '1',
                kustodian: kustodian,
                tipe: document.getElementById('tipe').value || '',
                lokasi_fisik: document.getElementById('lokasi_fisik').value || '',
                tag_number: document.getElementById('tag_number').value || '',
                manufacturer: document.getElementById('manufacturer').value || '',
                tahun_installasi: document.getElementById('tahun_installasi').value ? parseInt(document.getElementById('tahun_installasi').value) : null,
                tahun_manufacture: document.getElementById('tahun_manufacture').value ? parseInt(document.getElementById('tahun_manufacture').value) : null,
                psi_progress: 0,
                psi_wajib_progress: 0,
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                // Simpan ke Firestore
                await db.collection('equipment').add(equipmentData);
                
                // Tampilkan pesan sukses
                const alertDiv = document.getElementById('alertMessage');
                alertDiv.classList.remove('d-none', 'alert-danger');
                alertDiv.classList.add('alert-success');
                alertDiv.innerHTML = '<i class="fas fa-check-circle"></i> Equipment berhasil disimpan!';
                
                // Reset form
                document.getElementById('equipmentForm').reset();
                
                // Redirect ke dashboard setelah 2 detik
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Error saving equipment:', error);
                
                const alertDiv = document.getElementById('alertMessage');
                alertDiv.classList.remove('d-none', 'alert-success');
                alertDiv.classList.add('alert-danger');
                alertDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> Gagal menyimpan: ' + error.message;
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Simpan Equipment';
            }
        });
    </script>
</body>
</html>
