<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Equipment - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body {
            background: #fffeb3;
        }

        .navbar {
            background-color: #666547 !important;
            box-shadow: 0 2px 10px rgba(102, 101, 71, 0.3);
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            cursor: pointer;
        }
        .status-ada { background: #6fcb9f; color: #fff; }
        .status-missing { background: #fb2e01; color: #fff; }
        .status-update { background: #ffe28a; color: #666547; }
        .status-na { background: #666547; color: #fffeb3; }
        
        .psi-section {
            margin-bottom: 25px;
            border-left: 4px solid #666547;
            padding-left: 15px;
        }
        
        .progress {
            height: 25px;
            margin-bottom: 20px;
            background-color: #fffeb3;
        }
        
        .item-row {
            border-bottom: 1px solid #ffe28a;
            padding: 12px 0;
            transition: background-color 0.2s;
        }
        
        .item-row:hover {
            background-color: #fffeb3;
        }
        
        .kategori-badge {
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 3px;
            background: #ffe28a;
            color: #666547;
            margin-left: 5px;
        }
        
        .file-link {
            color: #666547;
            text-decoration: none;
            font-weight: 500;
        }
        
        .file-link:hover {
            color: #fb2e01;
            text-decoration: underline;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(102, 101, 71, 0.15);
        }

        .card-header.bg-primary {
            background-color: #666547 !important;
        }

        .card-header.bg-info {
            background-color: #6fcb9f !important;
        }

        .btn-warning {
            background-color: #ffe28a;
            border: none;
            color: #666547;
        }

        .btn-warning:hover {
            background-color: #fb2e01;
            color: #fff;
        }

        .btn-info {
            background-color: #6fcb9f;
            border: none;
            color: #fff;
        }

        .btn-info:hover {
            background-color: #5db88d;
            color: #fff;
        }

        .btn-outline-primary {
            color: #666547;
            border-color: #666547;
        }

        .btn-outline-primary:hover {
            background-color: #666547;
            border-color: #666547;
            color: #fffeb3;
        }

        .modal-header.bg-primary {
            background-color: #666547 !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #6fcb9f;
            box-shadow: 0 0 0 0.2rem rgba(111, 203, 159, 0.25);
        }

        .alert-info {
            background-color: #ffe28a;
            color: #666547;
            border: none;
        }

        .text-primary {
            color: #666547 !important;
        }

        .text-muted {
            color: #666547 !important;
            opacity: 0.7;
        }

        .bg-light {
            background-color: #fffeb3 !important;
        }

        .table-danger {
            background-color: rgba(251, 46, 1, 0.1) !important;
        }

        .font-monospace {
            color: #666547;
        }

        .spinner-border.text-primary {
            color: #666547 !important;
        }

        .badge.bg-secondary {
            background-color: #ffe28a !important;
            color: #666547;
        }

        .badge.bg-danger {
            background-color: #fb2e01 !important;
        }

        .badge.bg-info {
            background-color: #6fcb9f !important;
        }

        .badge.bg-success {
            background-color: #6fcb9f !important;
        }

        .badge.bg-light {
            background-color: #fffeb3 !important;
            color: #666547;
        }

        .btn-close-white {
            filter: none;
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management - Detail Equipment
            </span>
            <div>
                <button class="btn btn-light me-2" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                <button class="btn btn-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Loading Spinner -->
        <div id="loadingDiv" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Memuat data equipment...</p>
        </div>

        <!-- Main Content -->
        <div id="contentDiv" style="display: none;">
            <!-- Header Equipment -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 id="equipTitle" class="mb-0"></h4>
                    <span id="formBadge" class="badge bg-light"></span>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-8">
                            <table class="table table-sm">
                                <tr><th style="width: 200px; color: #666547;">Equipment ID</th><td id="detailEquipId"></td></tr>
                                <tr><th style="color: #666547;">Area</th><td id="detailArea"></td></tr>
                                <tr><th style="color: #666547;">Kategori</th><td id="detailKategori"></td></tr>
                                <tr><th style="color: #666547;">Kustodian</th><td id="detailKustodian"></td></tr>
                                <tr><th style="color: #666547;">Lokasi Fisik</th><td id="detailLokasi"></td></tr>
                                <tr><th style="color: #666547;">Tipe Equipment</th><td id="detailTipe"></td></tr>
                            </table>
                        </div>
                        <div class="col-md-4">
                            <div class="card bg-light">
                                <div class="card-body">
                                    <h6 style="color: #666547;">Progress Kelengkapan PSI</h6>
                                    <div class="progress">
                                        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%; background-color: #6fcb9f;">0%</div>
                                    </div>
                                    <p id="progressText" class="mb-0 small" style="color: #666547;">0 dari 0 item</p>
                                </div>
                            </div>
                            <div class="mt-2 d-grid gap-2">
                                <button class="btn btn-warning btn-sm" onclick="editEquipment()">
                                    <i class="fas fa-edit"></i> Edit Equipment
                                </button>
                                <button class="btn btn-info btn-sm" onclick="window.location.href='dashboard.html'">
                                    <i class="fas fa-list"></i> Lihat Daftar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PSI Sections -->
            <div id="psiSections"></div>
        </div>
    </div>

    <!-- Modal Update Status -->
    <div class="modal fade" id="statusModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Update Status PSI</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-info">
                        <strong id="statusItemInfo"></strong>
                        <div id="itemKategori" class="small mt-1"></div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label" style="color: #666547;">Status <span class="text-danger">*</span></label>
                            <select class="form-select" id="statusSelect" required>
                                <option value="Ada">✅ Ada (Lengkap)</option>
                                <option value="Missing">❌ Missing (Tidak Ada)</option>
                                <option value="Update Needed">⚠️ Update Needed (Perlu Update)</option>
                                <option value="Not Applicable">➖ N/A (Tidak Berlaku)</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label" style="color: #666547;">Input Type</label>
                            <input type="text" class="form-control" id="inputTypeDisplay" readonly style="background-color: #fffeb3;">
                        </div>
                    </div>

                    <!-- Dynamic Input Container -->
                    <div id="valueInputContainer" class="mb-3">
                        <label class="form-label" id="valueLabel" style="color: #666547;">Nilai/Spesifikasi</label>
                        <!-- Input akan di-generate oleh JS berdasarkan input_type -->
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="color: #666547;">Catatan / Keterangan</label>
                        <textarea class="form-control" id="statusCatatan" rows="2" 
                                  placeholder="Contoh: Revisi 5, 2025, Halaman 3 rusak"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" style="color: #666547;">File Referensi</label>
                        <div class="input-group">
                            <input type="file" class="form-control" id="statusFileInput">
                            <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('statusFileInput').value=''" style="border-color: #ffe28a; color: #666547;">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                        <div class="form-text" style="color: #666547;">Upload file baru atau biarkan kosong</div>
                        <div id="currentFileDisplay" class="small mt-1"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="background-color: #666547; border: none;">Batal</button>
                    <button type="button" class="btn btn-primary" onclick="saveStatus()" style="background-color: #6fcb9f; border: none;">
                        <i class="fas fa-save"></i> Simpan Perubahan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    // 🔥 KONFIGURASI FIREBASE - RTDB
    const firebaseConfig = {
        apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
        authDomain: "psi-management-system.firebaseapp.com",
        databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "psi-management-system",
        storageBucket: "psi-management-system.firebasestorage.app",
        messagingSenderId: "1053490628908",
        appId: "1:1053490628908:web:6b272409217851f8ebc489"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    // ========== VARIABEL GLOBAL ==========
    let currentEquipment = null;
    let currentEquipmentKey = null;
    let psiMaster = null;
    let psiData = {};
    let currentItemKey = null;
    let currentSectionKey = null;
    let currentItemData = null;

    // Ambil equip_id dari URL (misal: ?id=V-1101)
    const urlParams = new URLSearchParams(window.location.search);
    const equipId = urlParams.get('id');
    console.log('Equip ID dari URL:', equipId);

    // ========== AUTH STATE ==========
    auth.onAuthStateChanged((user) => {
        if (!user) {
            window.location.href = 'index.html';
        } else if (equipId) {
            console.log('User logged in:', user.email);
            loadEquipmentData();
        } else {
            alert('ID equipment tidak ditemukan di URL');
            window.location.href = 'dashboard.html';
        }
    });

    // ========== FUNGSI LOAD EQUIPMENT ==========
    async function loadEquipmentData() {
        try {
            console.log('Loading equipment data for:', equipId);
            
            const equipmentRef = database.ref('equipment');
            const snapshot = await equipmentRef.orderByChild('equip_id').equalTo(equipId).once('value');
            
            if (!snapshot.exists()) {
                alert(`Equipment dengan ID "${equipId}" tidak ditemukan`);
                window.location.href = 'dashboard.html';
                return;
            }
            
            snapshot.forEach((childSnapshot) => {
                currentEquipmentKey = childSnapshot.key;
                currentEquipment = childSnapshot.val();
                console.log('Found equipment:', currentEquipmentKey, currentEquipment);
                return true;
            });
            
            await loadMasterAndPsiData();
            
        } catch (error) {
            console.error('Error loading equipment:', error);
            alert('Gagal memuat data: ' + error.message);
        }
    }

    // ========== FUNGSI LOAD MASTER & PSI DATA ==========
    async function loadMasterAndPsiData() {
        try {
            const tipe = currentEquipment.tipe || 'pressure_vessel';
            console.log('Loading master PSI for type:', tipe);
            
            const masterSnapshot = await database.ref(tipe).once('value');
            if (!masterSnapshot.exists()) {
                console.warn(`Master data untuk tipe "${tipe}" tidak ditemukan`);
                psiMaster = null;
            } else {
                psiMaster = masterSnapshot.val();
                console.log('Master data loaded:', psiMaster);
            }

            const psiSnapshot = await database.ref('psi_data/' + equipId).once('value');
            psiData = psiSnapshot.val() || {};
            console.log('PSI data loaded:', psiData);
            
            displayEquipment();
            displayPsiSections();
            
            document.getElementById('loadingDiv').style.display = 'none';
            document.getElementById('contentDiv').style.display = 'block';
            
        } catch (error) {
            console.error('Error loading master/PSI data:', error);
            alert('Gagal memuat master data: ' + error.message);
        }
    }

    // ========== FUNGSI DISPLAY EQUIPMENT ==========
    function displayEquipment() {
        const data = currentEquipment;
        
        document.getElementById('equipTitle').textContent = `${data.equip_id} - ${data.nama}`;
        document.getElementById('formBadge').textContent = psiMaster?.nama_form || 'PSI Form';
        document.getElementById('detailEquipId').textContent = data.equip_id;
        document.getElementById('detailArea').textContent = data.area || '-';
        
        let kategoriText = 'Kategori ' + data.kategori;
        if (data.kategori === 1) kategoriText += ' (Critical)';
        document.getElementById('detailKategori').innerHTML = 
            `<span class="badge bg-${data.kategori === 1 ? 'danger' : 'secondary'}">${kategoriText}</span>`;
        
        document.getElementById('detailKustodian').textContent = data.kustodian || '-';
        document.getElementById('detailLokasi').textContent = data.lokasi_fisik || '-';
        document.getElementById('detailTipe').textContent = getTipeLabel(data.tipe) || 'pressure_vessel';
    }

    // ========== FUNGSI DISPLAY PSI SECTIONS ==========
    function displayPsiSections() {
        const container = document.getElementById('psiSections');
        container.innerHTML = '';
        
        if (!psiMaster || !psiMaster.sections) {
            container.innerHTML = `
                <div class="alert" style="background: #ffe28a; color: #666547;">
                    <i class="fas fa-exclamation-triangle"></i> 
                    Master data PSI untuk tipe "${currentEquipment.tipe || 'pressure_vessel'}" tidak ditemukan.<br>
                    <small>Silakan upload master data terlebih dahulu atau pilih tipe equipment yang sesuai.</small>
                </div>
                <div class="mt-3">
                    <button class="btn" onclick="window.location.href='upload-master.html'" style="background: #6fcb9f; color: #fff;">
                        <i class="fas fa-upload"></i> Upload Master Data
                    </button>
                </div>
            `;
            return;
        }

        let totalItems = 0;
        let adaItems = 0;
        let wajibItems = 0;
        let wajibAdaItems = 0;

        Object.keys(psiMaster.sections).forEach(sectionKey => {
            const section = psiMaster.sections[sectionKey];
            
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'card mb-4 shadow-sm';
            sectionDiv.id = `section-${sectionKey}`;
            
            let itemsHtml = '';
            
            if (section.items) {
                Object.keys(section.items).forEach(itemKey => {
                    const item = section.items[itemKey];
                    
                    const psiItem = psiData[sectionKey]?.[itemKey] || {};
                    const status = psiItem.status || 'Missing';
                    const value = psiItem.value || '';
                    const catatan = psiItem.catatan || '';
                    const file = psiItem.file || '';
                    const updatedAt = psiItem.updated_at ? new Date(psiItem.updated_at).toLocaleString('id-ID') : '';

                    totalItems++;
                    if (item.wajib) {
                        wajibItems++;
                        if (status === 'Ada') wajibAdaItems++;
                    }
                    if (status === 'Ada') adaItems++;

                    let statusClass = 'status-missing';
                    let statusText = '❌ Missing';
                    let rowClass = '';
                    
                    if (status === 'Ada') {
                        statusClass = 'status-ada';
                        statusText = '✅ Ada';
                    } else if (status === 'Update Needed') {
                        statusClass = 'status-update';
                        statusText = '⚠️ Update';
                    } else if (status === 'Not Applicable') {
                        statusClass = 'status-na';
                        statusText = '➖ N/A';
                    }

                    if (item.wajib && status !== 'Ada' && status !== 'Not Applicable') {
                        rowClass = 'table-danger';
                    }

                    let inputIcon = 'file-alt';
                    if (item.input_type === 'text') inputIcon = 'keyboard';
                    else if (item.input_type === 'number') inputIcon = 'hashtag';
                    else if (item.input_type === 'date') inputIcon = 'calendar';
                    else if (item.input_type === 'file') inputIcon = 'file-upload';

                    itemsHtml += `
                        <div class="item-row ${rowClass}" data-item-key="${itemKey}">
                            <div class="row align-items-center">
                                <div class="col-md-1 text-center">
                                    <small class="text-muted font-monospace">${item.kode}</small>
                                </div>
                                <div class="col-md-4">
                                    <div class="d-flex align-items-center">
                                        <i class="fas fa-${inputIcon} text-muted me-2 small"></i>
                                        <span class="fw-semibold" style="color: #666547;">${item.nama}</span>
                                        ${item.wajib ? '<span class="badge bg-danger ms-2" title="Wajib">W</span>' : ''}
                                    </div>
                                    <span class="kategori-badge">Kategori ${item.kategori}</span>
                                    ${item.input_type ? `<span class="kategori-badge">${item.input_type}</span>` : ''}
                                </div>
                                <div class="col-md-2 text-center">
                                    <span class="status-badge ${statusClass}" 
                                          onclick="showStatusModal('${sectionKey}', '${itemKey}', '${escapeHtml(item.nama)}')"
                                          style="cursor: pointer;">
                                        ${statusText}
                                    </span>
                                </div>
                                <div class="col-md-3">
                                    ${value ? `<div class="small fw-bold" style="color: #666547;">${escapeHtml(value)}</div>` : ''}
                                    ${catatan ? `<div class="small" style="color: #fb2e01;"><i class="fas fa-sticky-note"></i> ${escapeHtml(catatan)}</div>` : ''}
                                    ${file ? `<div class="small"><a href="#" class="file-link" onclick="viewFile('${escapeHtml(file)}'); return false;"><i class="fas fa-paperclip"></i> ${escapeHtml(file)}</a></div>` : ''}
                                    ${updatedAt ? `<div class="small text-muted mt-1"><i class="fas fa-clock"></i> ${updatedAt}</div>` : ''}
                                </div>
                                <div class="col-md-2 text-end">
                                    <button class="btn btn-sm btn-outline-primary" 
                                            onclick="showStatusModal('${sectionKey}', '${itemKey}', '${escapeHtml(item.nama)}')"
                                            title="Update status">
                                        <i class="fas fa-edit"></i> Update
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            const sectionTotal = Object.keys(section.items || {}).length;
            const sectionAda = Object.keys(section.items || {}).reduce((acc, key) => {
                return acc + (psiData[sectionKey]?.[key]?.status === 'Ada' ? 1 : 0);
            }, 0);
            const sectionProgress = sectionTotal > 0 ? Math.round((sectionAda / sectionTotal) * 100) : 0;

            sectionDiv.innerHTML = `
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">
                        <i class="fas fa-${section.icon || 'folder'} me-2"></i> ${section.judul}
                    </h5>
                    <div class="d-flex align-items-center">
                        <div class="progress me-3" style="width: 100px; height: 8px; background: rgba(255,255,255,0.3);">
                            <div class="progress-bar bg-light" style="width: ${sectionProgress}%"></div>
                        </div>
                        <span class="badge bg-light text-dark">${sectionAda}/${sectionTotal}</span>
                    </div>
                </div>
                <div class="card-body p-0">
                    ${itemsHtml || '<div class="p-3 text-muted text-center">Tidak ada item dalam section ini</div>'}
                </div>
            `;
            
            container.appendChild(sectionDiv);
        });

        const percentage = totalItems > 0 ? Math.round((adaItems / totalItems) * 100) : 0;
        const wajibPercentage = wajibItems > 0 ? Math.round((wajibAdaItems / wajibItems) * 100) : 0;
        
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = percentage + '%';
        progressBar.textContent = percentage + '%';
        
        // Warna progress bar berdasarkan percentage
        if (percentage >= 90) {
            progressBar.style.backgroundColor = '#6fcb9f';
        } else if (percentage >= 70) {
            progressBar.style.backgroundColor = '#ffe28a';
            progressBar.style.color = '#666547';
        } else if (percentage >= 50) {
            progressBar.style.backgroundColor = '#fb2e01';
        } else {
            progressBar.style.backgroundColor = '#666547';
        }
        
        document.getElementById('progressText').innerHTML = `
            <strong>${adaItems}</strong> dari <strong>${totalItems}</strong> item lengkap (${percentage}%)<br>
            <small style="${wajibPercentage < 100 ? 'color: #fb2e01;' : 'color: #6fcb9f;'}">
                Wajib: ${wajibAdaItems}/${wajibItems} (${wajibPercentage}%)
            </small>
        `;
        
        if (currentEquipmentKey) {
            database.ref('equipment/' + currentEquipmentKey).update({
                psi_progress: percentage,
                psi_wajib_progress: wajibPercentage,
                psi_last_updated: new Date().toISOString()
            });
        }
    }

    // ========== FUNGSI SHOW STATUS MODAL ==========
    function showStatusModal(sectionKey, itemKey, itemNama) {
        currentSectionKey = sectionKey;
        currentItemKey = itemKey;
        currentItemData = psiMaster.sections[sectionKey].items[itemKey];
        
        const psiItem = psiData[sectionKey]?.[itemKey] || {};
        
        document.getElementById('statusItemInfo').textContent = `${itemNama} (${sectionKey})`;
        document.getElementById('itemKategori').innerHTML = `
            Kategori: <span class="badge bg-secondary">${currentItemData.kategori}</span>
            ${currentItemData.wajib ? ' <span class="badge bg-danger">WAJIB</span>' : ''}
            ${currentItemData.input_type ? ` <span class="badge bg-info">${currentItemData.input_type}</span>` : ''}
        `;
        
        document.getElementById('statusSelect').value = psiItem.status || 'Missing';
        document.getElementById('inputTypeDisplay').value = currentItemData.input_type || 'text';
        document.getElementById('statusCatatan').value = psiItem.catatan || '';
        
        generateValueInput(currentItemData.input_type, psiItem.value || '');
        
        const fileDisplay = document.getElementById('currentFileDisplay');
        if (psiItem.file) {
            fileDisplay.innerHTML = `<span class="badge" style="background: #6fcb9f; color: #fff;"><i class="fas fa-check"></i> File: ${psiItem.file}</span>`;
        } else {
            fileDisplay.innerHTML = '<span class="text-muted">Belum ada file</span>';
        }
        
        const modal = new bootstrap.Modal(document.getElementById('statusModal'));
        modal.show();
    }

    // ========== FUNGSI GENERATE DYNAMIC INPUT ==========
    function generateValueInput(inputType, currentValue) {
        const container = document.getElementById('valueInputContainer');
        const label = document.getElementById('valueLabel');
        
        container.innerHTML = '';
        
        if (inputType === 'file') {
            label.textContent = 'Nama File / Dokumen';
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'form-control';
            input.id = 'statusValue';
            input.value = currentValue;
            input.placeholder = 'Contoh: PID_V1101_Rev5.pdf';
            container.appendChild(input);
        } else if (inputType === 'date') {
            label.textContent = 'Tanggal';
            const input = document.createElement('input');
            input.type = 'date';
            input.className = 'form-control';
            input.id = 'statusValue';
            input.value = currentValue;
            container.appendChild(input);
        } else if (inputType === 'number') {
            label.textContent = 'Nilai Numerik';
            const input = document.createElement('input');
            input.type = 'number';
            input.className = 'form-control';
            input.id = 'statusValue';
            input.value = currentValue;
            input.placeholder = 'Contoh: 10.5, 150, 2024';
            container.appendChild(input);
        } else {
            label.textContent = 'Nilai / Spesifikasi / Keterangan';
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'form-control';
            input.id = 'statusValue';
            input.value = currentValue;
            input.placeholder = 'Contoh: ASME VIII Div.1, 10 barg, SS316L';
            container.appendChild(input);
        }
    }

    // ========== FUNGSI SAVE STATUS ==========
    function saveStatus() {
        const newStatus = document.getElementById('statusSelect').value;
        const newValue = document.getElementById('statusValue')?.value.trim() || '';
        const newCatatan = document.getElementById('statusCatatan').value.trim();
        
        const updatePath = `psi_data/${equipId}/${currentSectionKey}/${currentItemKey}`;
        const updateData = {
            status: newStatus,
            updated_at: new Date().toISOString(),
            updated_by: auth.currentUser.email
        };
        
        if (newValue) updateData.value = newValue;
        if (newCatatan) updateData.catatan = newCatatan;
        
        const fileInput = document.getElementById('statusFileInput');
        if (fileInput.files.length > 0) {
            updateData.file = fileInput.files[0].name;
        } else if (psiData[currentSectionKey]?.[currentItemKey]?.file) {
            updateData.file = psiData[currentSectionKey][currentItemKey].file;
        }
        
        console.log('Saving to path:', updatePath);
        console.log('Data:', updateData);
        
        database.ref(updatePath).update(updateData)
            .then(() => {
                if (!psiData[currentSectionKey]) psiData[currentSectionKey] = {};
                psiData[currentSectionKey][currentItemKey] = updateData;
                
                displayPsiSections();
                
                bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
                
                showAlert('Status berhasil diupdate!', 'success');
            })
            .catch(error => {
                console.error('Error saving:', error);
                showAlert('Gagal menyimpan: ' + error.message, 'danger');
            });
    }

    // ========== FUNGSI EDIT EQUIPMENT ==========
    function editEquipment() {
        if (currentEquipmentKey) {
            window.location.href = `edit-equipment.html?id=${currentEquipmentKey}`;
        } else {
            alert('Equipment key tidak ditemukan');
        }
    }

    // ========== FUNGSI LOGOUT ==========
    function logout() {
        auth.signOut().then(() => {
            window.location.href = 'index.html';
        });
    }

    // ========== HELPER FUNCTIONS ==========
    function escapeHtml(text) {
        if (!text) return '';
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function viewFile(filename) {
        alert('View file: ' + filename + '\n(Implementasi Firebase Storage diperlukan)');
    }

    function showAlert(message, type) {
        const alertDiv = document.createElement('div');
        alertDiv.className = `alert alert-dismissible fade show position-fixed`;
        alertDiv.style.cssText = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
        
        if (type === 'success') {
            alertDiv.style.backgroundColor = '#6fcb9f';
            alertDiv.style.color = '#fff';
        } else {
            alertDiv.style.backgroundColor = '#fb2e01';
            alertDiv.style.color = '#fff';
        }
        
        alertDiv.innerHTML = `
            ${message}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        `;
        document.body.appendChild(alertDiv);
        
        setTimeout(() => {
            alertDiv.remove();
        }, 3000);
    }

    function getTipeLabel(tipe) {
        const labels = {
            'pressure_vessel': 'Pressure Vessel',
            'heat_exchanger': 'Heat Exchanger',
            'piping': 'Piping',
            'rotating': 'Rotating',
            'relief_systems': 'Relief System',
            'storage_tank': 'Storage Tank',
            'fired_heater': 'Fired Heater',
            'electrical': 'Electrical',
            'instrumentation': 'Instrumentation',
            'reactors': 'Reactor',
            'columns_towers': 'Column/Tower',
            'compressors': 'Compressor',
            'cooling_towers': 'Cooling Tower',
            'utility_systems': 'Utility',
            'safety_systems': 'Safety System'
        };
        return labels[tipe] || tipe || '-';
    }
