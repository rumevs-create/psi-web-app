<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Equipment - PSI System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body{background:#fffeb3;}
.navbar{background:#666547!important;}
.card{border:none;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1);}
.card-header{background:#666547!important;color:white;}
.item-card{border-left:5px solid #6fcb9f;}
.item-card.missing{border-left-color:#fb2e01;}
.item-card.update{border-left-color:#ffe28a;}
.doc-meta{background:#f8f9fa;border-radius:8px;padding:10px;margin-top:10px;}
.small-label{font-size:12px;color:#666547;}
</style>
</head>
<body>

<nav class="navbar navbar-dark">
<div class="container-fluid">
<span class="navbar-brand">
<i class="fas fa-shield-alt"></i> PSI Detail
</span>
<button class="btn btn-light" onclick="logout()">Logout</button>
</div>
</nav>

<div class="container mt-4">

<div id="loadingDiv" class="text-center py-5">
<div class="spinner-border text-primary"></div>
<p>Memuat data...</p>
</div>

<div id="contentDiv" style="display:none;">

<div class="card mb-4">
<div class="card-header">
<h5 id="equipTitle" class="mb-0"></h5>
</div>
<div class="card-body">
<table class="table table-sm">
<tr><th>ID</th><td id="detailEquipId"></td></tr>
<tr><th>Area</th><td id="detailArea"></td></tr>
<tr><th>Kustodian</th><td id="detailKustodian"></td></tr>
<tr><th>Tipe</th><td id="detailTipe"></td></tr>
</table>
</div>
</div>

<div id="psiSections"></div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
authDomain:"psi-management-system.firebaseapp.com",
databaseURL:"https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"psi-management-system"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.database();

let psiMaster=null;
let psiData={};
let currentEquip=null;

const equipId=new URLSearchParams(window.location.search).get("id");

auth.onAuthStateChanged(async user=>{
if(!user){window.location.href='index.html';return;}
await loadData();
});

async function loadData(){

const snap=await db.ref("equipment")
.orderByChild("equip_id").equalTo(equipId).once("value");

snap.forEach(child=>{currentEquip=child.val();});

psiMaster=(await db.ref(currentEquip.tipe).once("value")).val();
psiData=(await db.ref("psi_data/"+equipId).once("value")).val()||{};

document.getElementById("equipTitle").innerText=
currentEquip.equip_id+" - "+currentEquip.nama;

document.getElementById("detailEquipId").innerText=currentEquip.equip_id;
document.getElementById("detailArea").innerText=currentEquip.area||"-";
document.getElementById("detailKustodian").innerText=currentEquip.kustodian||"-";
document.getElementById("detailTipe").innerText=currentEquip.tipe||"-";

renderSections();

loadingDiv.style.display="none";
contentDiv.style.display="block";
}

function renderSections(){

const container=document.getElementById("psiSections");
container.innerHTML="";

Object.keys(psiMaster.sections||{}).forEach(sectionKey=>{

let html="";

Object.keys(psiMaster.sections[sectionKey].items||{}).forEach(itemKey=>{

const item=psiMaster.sections[sectionKey].items[itemKey];
const data=psiData[sectionKey]?.[itemKey]||{};
const meta=data.metadata||{};

let cardClass="item-card";
if(data.status==="Missing") cardClass+=" missing";
if(data.status==="Update Needed") cardClass+=" update";

html+=`
<div class="card mb-3 ${cardClass}">
<div class="card-body">

<h6>${item.nama}</h6>

<div class="row mt-2">
<div class="col-md-3">
<label class="small-label">Status</label>
<select class="form-select form-select-sm"
onchange="updateField('${sectionKey}','${itemKey}','status',this.value)">
<option ${data.status==="Ada"?"selected":""}>Ada</option>
<option ${data.status==="Missing"?"selected":""}>Missing</option>
<option ${data.status==="Update Needed"?"selected":""}>Update Needed</option>
<option ${data.status==="Not Applicable"?"selected":""}>Not Applicable</option>
</select>
</div>

<div class="col-md-3">
<label class="small-label">Nilai</label>
<input class="form-control form-control-sm"
value="${data.value||""}"
onblur="updateField('${sectionKey}','${itemKey}','value',this.value)">
</div>

<div class="col-md-3">
<label class="small-label">Catatan</label>
<input class="form-control form-control-sm"
value="${data.catatan||""}"
onblur="updateField('${sectionKey}','${itemKey}','catatan',this.value)">
</div>
</div>

<div class="doc-meta mt-3">
<div class="row">
<div class="col-md-2">
<label class="small-label">Version</label>
<input class="form-control form-control-sm"
value="${meta.version||""}"
onblur="updateMetadata('${sectionKey}','${itemKey}','version',this.value)">
</div>

<div class="col-md-2">
<label class="small-label">Approved</label>
<input class="form-control form-control-sm"
value="${meta.approved_by||""}"
onblur="updateMetadata('${sectionKey}','${itemKey}','approved_by',this.value)">
</div>

<div class="col-md-2">
<label class="small-label">Revision</label>
<input type="date" class="form-control form-control-sm"
value="${meta.revision_date||""}"
onblur="updateMetadata('${sectionKey}','${itemKey}','revision_date',this.value)">
</div>

<div class="col-md-2">
<label class="small-label">Review Due</label>
<input type="date" class="form-control form-control-sm"
value="${meta.review_due||""}"
onblur="updateMetadata('${sectionKey}','${itemKey}','review_due',this.value)">
</div>

<div class="col-md-2">
<label class="small-label">MOC</label>
<input class="form-control form-control-sm"
value="${meta.moc_ref||""}"
onblur="updateMetadata('${sectionKey}','${itemKey}','moc_ref',this.value)">
</div>
</div>
</div>

</div>
</div>
`;
});

container.innerHTML+=`
<div class="card mb-4">
<div class="card-header">${psiMaster.sections[sectionKey].judul}</div>
<div class="card-body">${html}</div>
</div>
`;
});
}

function updateField(section,item,field,value){
db.ref(`psi_data/${equipId}/${section}/${item}`)
.update({
[field]:value,
updated_at:new Date().toISOString(),
updated_by:auth.currentUser.email
});
}

function updateMetadata(section,item,field,value){
db.ref(`psi_data/${equipId}/${section}/${item}/metadata`)
.update({
[field]:value,
updated_at:new Date().toISOString(),
updated_by:auth.currentUser.email
});
}

function logout(){
auth.signOut().then(()=>window.location.href="index.html");
}
</script>

</body>
</html>
