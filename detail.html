<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Equipment - PSI System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
    --color-olive:#666547;
    --color-red:#fb2e01;
    --color-mint:#6fcb9f;
    --color-yellow:#ffe28a;
    --color-cream:#fffeb3;
}

body{background:#fffeb3;}

.navbar{
    background-color:#666547!important;
    box-shadow:0 2px 10px rgba(102,101,71,.3);
}

.status-badge{
    padding:5px 10px;
    border-radius:15px;
    font-size:12px;
    font-weight:bold;
    display:inline-block;
    cursor:pointer;
}
.status-ada{background:#6fcb9f;color:#fff;}
.status-missing{background:#fb2e01;color:#fff;}
.status-update{background:#ffe28a;color:#666547;}
.status-na{background:#666547;color:#fffeb3;}

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(102,101,71,.15);
}

.card-header.bg-primary{
    background-color:#666547!important;
}

/* ===== NEW DOCUMENT CONTROL STYLE ===== */
.doc-metadata{
    background:#f8f9fa;
    border-left:4px solid #6fcb9f;
    padding:8px 12px;
    border-radius:8px;
    margin-top:8px;
    font-size:12px;
}

.doc-metadata.overdue{
    border-left:4px solid #fb2e01;
    background:rgba(251,46,1,.08);
}
</style>
</head>

<body>

<nav class="navbar navbar-dark">
<div class="container-fluid">
<span class="navbar-brand">
<i class="fas fa-shield-alt"></i> PSI Management - Detail Equipment
</span>
<div>
<button class="btn btn-light me-2" onclick="window.location.href='dashboard.html'">
<i class="fas fa-arrow-left"></i> Kembali
</button>
<button class="btn btn-light" onclick="logout()">
<i class="fas fa-sign-out-alt"></i> Logout
</button>
</div>
</div>
</nav>

<div class="container mt-4">

<div id="loadingDiv" class="text-center py-5">
<div class="spinner-border text-primary"></div>
<p class="mt-2 text-muted">Memuat data equipment...</p>
</div>

<div id="contentDiv" style="display:none;">

<div class="card mb-4">
<div class="card-header bg-primary text-white">
<h4 id="equipTitle" class="mb-0"></h4>
</div>
<div class="card-body">
<table class="table table-sm">
<tr><th>Equipment ID</th><td id="detailEquipId"></td></tr>
<tr><th>Area</th><td id="detailArea"></td></tr>
<tr><th>Kustodian</th><td id="detailKustodian"></td></tr>
<tr><th>Tipe</th><td id="detailTipe"></td></tr>
</table>
</div>
</div>

<div id="psiSections"></div>

</div>
</div>

<!-- ===== METADATA MODAL ===== -->
<div class="modal fade" id="metadataModal">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header bg-primary text-white">
<h5 class="modal-title">Edit Metadata</h5>
<button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">

<input type="hidden" id="metaSectionKey">
<input type="hidden" id="metaItemKey">

<div class="mb-2">
<label>Version</label>
<input type="text" id="meta_version" class="form-control">
</div>

<div class="mb-2">
<label>Approved By</label>
<input type="text" id="meta_approved_by" class="form-control">
</div>

<div class="mb-2">
<label>Revision Date</label>
<input type="date" id="meta_revision_date" class="form-control">
</div>

<div class="mb-2">
<label>Custodian</label>
<input type="text" id="meta_custodian" class="form-control">
</div>

<div class="mb-2">
<label>Review Due</label>
<input type="date" id="meta_review_due" class="form-control">
</div>

<div class="mb-2">
<label>MOC Reference</label>
<input type="text" id="meta_moc_ref" class="form-control">
</div>

</div>
<div class="modal-footer">
<button class="btn btn-info" onclick="saveMetadata()">Save</button>
</div>
</div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
authDomain:"psi-management-system.firebaseapp.com",
databaseURL:"https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"psi-management-system"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const database=firebase.database();

let currentEquipmentKey=null;
let psiMaster=null;
let psiData={};
const urlParams=new URLSearchParams(window.location.search);
const equipId=urlParams.get('id');

auth.onAuthStateChanged(user=>{
if(!user){window.location.href='index.html';}
else loadEquipment();
});

async function loadEquipment(){
const snap=await database.ref('equipment')
.orderByChild('equip_id').equalTo(equipId).once('value');

snap.forEach(child=>{
currentEquipmentKey=child.key;
});

const equip= snap.val()[currentEquipmentKey];

document.getElementById('equipTitle').innerText=
equip.equip_id+" - "+equip.nama;

document.getElementById('detailEquipId').innerText=equip.equip_id;
document.getElementById('detailArea').innerText=equip.area||'-';
document.getElementById('detailKustodian').innerText=equip.kustodian||'-';
document.getElementById('detailTipe').innerText=equip.tipe||'-';

psiMaster=(await database.ref(equip.tipe).once('value')).val();
psiData=(await database.ref('psi_data/'+equipId).once('value')).val()||{};

displayPsiSections();

document.getElementById('loadingDiv').style.display='none';
document.getElementById('contentDiv').style.display='block';
}

function displayPsiSections(){

const container=document.getElementById('psiSections');
container.innerHTML='';

Object.keys(psiMaster.sections||{}).forEach(sectionKey=>{

let html='';

Object.keys(psiMaster.sections[sectionKey].items||{}).forEach(itemKey=>{

const item=psiMaster.sections[sectionKey].items[itemKey];
const psiItem=psiData[sectionKey]?.[itemKey]||{};
const metadata=psiItem.metadata||{};
const status=psiItem.status||'Missing';

let statusClass='status-missing';
let statusText='❌ Missing';

if(status==='Ada'){
    statusClass='status-ada';
    statusText='✅ Ada';
}
if(status==='Update Needed'){
    statusClass='status-update';
    statusText='⚠️ Update Needed';
}
if(status==='Not Applicable'){
    statusClass='status-na';
    statusText='➖ N/A';
}

let overdue='';
if(metadata.review_due){
    if(new Date(metadata.review_due)<new Date()){
        overdue='overdue';
    }
}

html+=`
<div class="card mb-3">
<div class="card-body">

<div class="row align-items-center">
<div class="col-md-6">
<strong>${item.nama}</strong>
</div>

<div class="col-md-3 text-center">
<span class="status-badge ${statusClass}">
${statusText}
</span>
</div>

<div class="col-md-3 text-end">
<button class="btn btn-sm btn-outline-primary"
onclick="openMetadataModal('${sectionKey}','${itemKey}')">
Metadata
</button>
</div>
</div>

${psiItem.value ? `
<div class="mt-2 small">
<strong>Nilai:</strong> ${psiItem.value}
</div>` : ''}

${psiItem.catatan ? `
<div class="mt-1 small text-muted">
<strong>Catatan:</strong> ${psiItem.catatan}
</div>` : ''}

<div class="doc-metadata ${overdue}">
<div><strong>Version:</strong> ${metadata.version||'-'}</div>
<div><strong>Approved By:</strong> ${metadata.approved_by||'-'}</div>
<div><strong>Revision Date:</strong> ${metadata.revision_date||'-'}</div>
<div><strong>Custodian:</strong> ${metadata.custodian||'-'}</div>
<div><strong>Review Due:</strong> ${metadata.review_due||'-'}</div>
<div><strong>MOC Ref:</strong> ${metadata.moc_ref||'-'}</div>
</div>

</div>
</div>
`;
});

container.innerHTML+=`
<div class="card mb-4">
<div class="card-header bg-primary text-white">
${psiMaster.sections[sectionKey].judul}
</div>
<div class="card-body">
${html}
</div>
</div>
`;

});
}

function openMetadataModal(sectionKey,itemKey){

document.getElementById('metaSectionKey').value=sectionKey;
document.getElementById('metaItemKey').value=itemKey;

const meta=psiData[sectionKey]?.[itemKey]?.metadata||{};

meta_version.value=meta.version||'';
meta_approved_by.value=meta.approved_by||'';
meta_revision_date.value=meta.revision_date||'';
meta_custodian.value=meta.custodian||'';
meta_review_due.value=meta.review_due||'';
meta_moc_ref.value=meta.moc_ref||'';

bootstrap.Modal.getOrCreateInstance(
document.getElementById('metadataModal')
).show();
}

function saveMetadata(){

const sectionKey=metaSectionKey.value;
const itemKey=metaItemKey.value;

const metadata={
version:meta_version.value,
approved_by:meta_approved_by.value,
revision_date:meta_revision_date.value,
custodian:meta_custodian.value,
review_due:meta_review_due.value,
moc_ref:meta_moc_ref.value,
updated_at:new Date().toISOString(),
updated_by:auth.currentUser.email
};

database.ref(`psi_data/${equipId}/${sectionKey}/${itemKey}/metadata`)
.update(metadata)
.then(()=>{
if(!psiData[sectionKey]) psiData[sectionKey]={};
if(!psiData[sectionKey][itemKey]) psiData[sectionKey][itemKey]={};
psiData[sectionKey][itemKey].metadata=metadata;

displayPsiSections();
bootstrap.Modal.getInstance(
document.getElementById('metadataModal')
).hide();
});
}

function logout(){
auth.signOut().then(()=>window.location.href='index.html');
}
</script>

</body>
</html>
