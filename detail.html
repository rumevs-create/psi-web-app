<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Equipment - PSI System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .psi-section {
            margin-bottom: 20px;
            border-left: 4px solid #0b5394;
            padding-left: 15px;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-ada { background: #d4edda; color: #155724; }
        .status-missing { background: #f8d7da; color: #721c24; }
        .status-update { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand">
                <i class="fas fa-shield-alt"></i> PSI Management - Detail Equipment
            </span>
            <div>
                <button class="btn btn-light me-2" onclick="window.location.href='dashboard.html'">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                <button class="btn btn-light" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="loadingDiv" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Memuat data equipment...</p>
        </div>

        <div id="contentDiv" style="display: none;">
            <!-- Header Equipment -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h4 id="equipTitle" class="mb-0"></h4>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6">
                            <table class="table table-sm">
                                <tr><th style="width: 150px;">Equipment ID</th><td id="detailEquipId"></td></tr>
                                <tr><th>Area</th><td id="detailArea"></td></tr>
                                <tr><th>Kategori</th><td id="detailKategori"></td></tr>
                                <tr><th>Kustodian</th><td id="detailKustodian"></td></tr>
                                <tr><th>Lokasi Fisik</th><td id="detailLokasi"></td></tr>
                            </table>
                        </div>
                        <div class="col-md-6">
                            <button class="btn btn-warning" onclick="editEquipment()">
                                <i class="fas fa-edit"></i> Edit Equipment
                            </button>
                            <button class="btn btn-success" onclick="tambahDokumen()">
                                <i class="fas fa-upload"></i> Upload Dokumen
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- PSI Sections -->
            <div class="row">
                <div class="col-md-6">
                    <div class="card mb-3">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0"><i class="fas fa-draw-polygon"></i> Drawings</h5>
                        </div>
                        <div class="card-body" id="drawingsList">
                            <p class="text-muted">Tidak ada data</p>
                        </div>
                    </div>

                    <div class="card mb-3">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0"><i class="fas fa-calculator"></i> Calculations</h5>
                        </div>
                        <div class="card-body" id="calculationsList">
                            <p class="text-muted">Tidak ada data</p>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card mb-3">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0"><i class="fas fa-clipboard-list"></i> Design Specifications</h5>
                        </div>
                        <div class="card-body" id="specsList">
                            <p class="text-muted">Tidak ada data</p>
                        </div>
                    </div>

                    <div class="card mb-3">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0"><i class="fas fa-history"></i> Inspection Records</h5>
                        </div>
                        <div class="card-body" id="inspectionList">
                            <p class="text-muted">Tidak ada data</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        // 🔥 KONFIGURASI FIREBASE (SESUAIKAN!)
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Ambil ID dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'index.html';
            } else if (docId) {
                loadEquipmentDetail(docId);
            } else {
                alert('ID equipment tidak ditemukan');
                window.location.href = 'dashboard.html';
            }
        });

        async function loadEquipmentDetail(id) {
            try {
                const doc = await db.collection('text').doc(id).get();
                
                if (!doc.exists) {
                    alert('Data tidak ditemukan');
                    window.location.href = 'dashboard.html';
                    return;
                }

                const data = doc.data();
                
                // Tampilkan header equipment
                document.getElementById('equipTitle').textContent = `${data.equip_id} - ${data.nama}`;
                document.getElementById('detailEquipId').textContent = data.equip_id;
                document.getElementById('detailArea').textContent = data.area;
                
                let kategoriText = 'Kategori ' + data.kategori;
                if (data.kategori === 1) kategoriText += ' (Critical)';
                document.getElementById('detailKategori').innerHTML = `<span class="badge bg-${data.kategori === 1 ? 'danger' : 'secondary'}">${kategoriText}</span>`;
                
                document.getElementById('detailKustodian').textContent = data.kustodian;
                document.getElementById('detailLokasi').textContent = data.lokasi_fisik || '-';

                // Simulasi data PSI (nanti bisa diisi dari sub-collection)
                loadPsiData();

                // Sembunyikan loading, tampilkan konten
                document.getElementById('loadingDiv').style.display = 'none';
                document.getElementById('contentDiv').style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                alert('Gagal memuat data: ' + error.message);
            }
        }

        function loadPsiData() {
            // Contoh data PSI (nanti diganti dengan data real dari database)
            const drawings = [
                { kode: '1.1', nama: 'P&ID', status: 'Ada', file: 'pid_v1101.pdf' },
                { kode: '1.2', nama: 'Shop Drawing', status: 'Missing' }
            ];

            const specs = [
                { kode: '2.1', nama: 'Design Code', status: 'Ada', value: 'ASME VIII Div.1' },
                { kode: '2.5', nama: 'Design Pressure', status: 'Ada', value: '10 barg @ 150°C' },
                { kode: '2.6', nama: 'Materials', status: 'Ada', value: 'SS 316L' },
                { kode: '2.14', nama: 'Nameplate Data', status: 'Ada', file: 'nameplate.jpg' }
            ];

            const calculations = [
                { kode: '3.1', nama: 'Wall Thickness', status: 'Missing', note: 'Perlu dicari' }
            ];

            const inspections = [
                { kode: '4.1', nama: 'Last Inspection', status: 'Ada', value: '2025-06-15' },
                { kode: '4.2', nama: 'Next Inspection', status: 'Ada', value: '2026-06-15' }
            ];

            renderPsiList('drawingsList', drawings);
            renderPsiList('specsList', specs);
            renderPsiList('calculationsList', calculations);
            renderPsiList('inspectionList', inspections);
        }

        function renderPsiList(elementId, items) {
            const container = document.getElementById(elementId);
            
            if (!items || items.length === 0) {
                container.innerHTML = '<p class="text-muted">Tidak ada data</p>';
                return;
            }

            let html = '<table class="table table-sm">';
            items.forEach(item => {
                let statusClass = '';
                let statusText = '';
                
                if (item.status === 'Ada') {
                    statusClass = 'status-ada';
                    statusText = '✅ Ada';
                } else if (item.status === 'Missing') {
                    statusClass = 'status-missing';
                    statusText = '❌ Missing';
                } else {
                    statusClass = 'status-update';
                    statusText = '⚠️ Update Needed';
                }

                html += '<tr>';
                html += `<td><small>${item.kode}</small></td>`;
                html += `<td>${item.nama}</td>`;
                html += `<td><span class="status-badge ${statusClass}">${statusText}</span></td>`;
                html += '<td>';
                if (item.file) {
                    html += `<button class="btn btn-sm btn-outline-primary" onclick="viewFile('${item.file}')"><i class="fas fa-file"></i> Lihat</button>`;
                } else if (item.value) {
                    html += `<small class="text-muted">${item.value}</small>`;
                } else if (item.note) {
                    html += `<small class="text-warning">📝 ${item.note}</small>`;
                }
                html += '</td>';
                html += '</tr>';
            });
            html += '</table>';
            
            container.innerHTML = html;
        }

        function editEquipment() {
            window.location.href = `edit-equipment.html?id=${docId}`;
        }

        function tambahDokumen() {
            alert('Fitur upload dokumen akan segera tersedia');
        }

        function viewFile(filename) {
            alert('Membuka file: ' + filename);
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'index.html';
            });
        }
    </script>
</body>
</html>
