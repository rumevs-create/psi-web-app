<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Equipment - Reliable Update</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --color-olive: #666547;
            --color-red: #fb2e01;
            --color-mint: #6fcb9f;
            --color-yellow: #ffe28a;
            --color-cream: #fffeb3;
        }

        body {
            background: var(--color-cream);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background-color: var(--color-olive) !important;
        }

        /* Data Item Styling */
        .data-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border-left: 4px solid transparent;
        }

        .data-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }

        .data-item.missing {
            background: #fff5f5;
            border-left-color: var(--color-red);
        }

        .data-item.filled {
            background: #f0fff4;
            border-left-color: var(--color-mint);
        }

        .data-item.warning {
            background: #fffbeb;
            border-left-color: var(--color-yellow);
        }

        .data-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .data-title {
            font-weight: 600;
            color: var(--color-olive);
            font-size: 1.1rem;
        }

        .data-badges {
            display: flex;
            gap: 5px;
        }

        .badge-category {
            background: var(--color-yellow);
            color: var(--color-olive);
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .badge-type {
            background: #e9ecef;
            color: #666;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
        }

        .badge-w {
            background: var(--color-red);
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: bold;
        }

        .data-value {
            font-size: 1rem;
            color: #333;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            min-height: 40px;
            display: flex;
            align-items: center;
        }

        .data-value.missing {
            background: #fee;
            color: var(--color-red);
            font-style: italic;
        }

        .data-value.filled {
            background: #e8f5e9;
            color: #2e7d32;
            font-weight: 500;
        }

        .btn-update {
            background: white;
            border: 2px solid var(--color-mint);
            color: var(--color-mint);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 500;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-update:hover {
            background: var(--color-mint);
            color: white;
        }

        .btn-update:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-update.loading {
            background: var(--color-mint);
            color: white;
            pointer-events: none;
        }

        /* Modal Styling */
        .modal-content {
            border-radius: 15px;
            border: none;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--color-olive) 0%, var(--color-mint) 100%);
            color: white;
            border-radius: 15px 15px 0 0;
        }

        .modal-footer {
            background: #f8f9fa;
            border-radius: 0 0 15px 15px;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }

        .toast {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border-left: 4px solid var(--color-mint);
            min-width: 300px;
        }

        .toast.success {
            border-left-color: var(--color-mint);
        }

        .toast.error {
            border-left-color: var(--color-red);
        }

        /* Progress Section */
        .progress-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .progress {
            height: 25px;
            border-radius: 15px;
            background: #e9ecef;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--color-mint) 0%, #5db88d 100%);
            border-radius: 15px;
            font-weight: 600;
            line-height: 25px;
        }

        /* Status Badge */
        .status-missing {
            background: var(--color-red);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .status-filled {
            background: var(--color-mint);
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center">
                <span class="navbar-brand">
                    <i class="fas fa-shield-alt me-2"></i>PSI Management System
                </span>
            </div>
            <a href="dashboard.html" class="btn btn-light btn-sm">
                <i class="fas fa-arrow-left me-1"></i> Kembali
            </a>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Equipment Header -->
        <div class="progress-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h4 class="mb-1" id="equipmentName">Loading...</h4>
                    <p class="text-muted mb-0" id="equipmentId">-</p>
                </div>
                <div class="text-end">
                    <div class="mb-2">
                        <span class="badge bg-danger" id="categoryBadge">EHS Critical</span>
                    </div>
                    <div class="text-muted small">
                        <span id="filledCount">0</span>/<span id="totalCount">0</span> Data Lengkap
                    </div>
                </div>
            </div>

            <div class="progress">
                <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
            </div>
        </div>

        <!-- Data Sections -->
        <div id="dataContainer">
            <!-- Data items will be generated here -->
        </div>
    </div>

    <!-- Update Modal -->
    <div class="modal fade" id="updateModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Update Data</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="updateForm">
                        <input type="hidden" id="fieldKey">
                        <div class="mb-3">
                            <label class="form-label fw-bold" id="fieldLabel">Field Name</label>
                            <input type="text" class="form-control form-control-lg" id="fieldValue" required>
                            <div class="form-text text-muted" id="fieldHint">Masukkan nilai yang sesuai</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-success" id="saveBtn" onclick="saveData()">
                        <i class="fas fa-save me-2"></i>Simpan
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyA1_SggH_uh1ZVbtoLD3u5-w6pqKgrgITk",
            authDomain: "psi-management-system.firebaseapp.com",
            databaseURL: "https://psi-management-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "psi-management-system",
            storageBucket: "psi-management-system.firebasestorage.app",
            messagingSenderId: "1053490628908",
            appId: "1:1053490628908:web:6b272409217851f8ebc489"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        // Global Variables
        let currentEquipment = null;
        let equipmentKey = null;
        let updateModal = null;

        // Data Structure Definition
        const dataStructure = [
            {
                section: "C. Mechanical Data",
                fields: [
                    { key: "shell_material", label: "Shell Material", type: "text", category: "1", required: true },
                    { key: "shell_thickness", label: "Shell Thickness (mm)", type: "number", category: "1", required: true },
                    { key: "head_material", label: "Head Material", type: "text", category: "1", required: true },
                    { key: "head_thickness", label: "Head Thickness (mm)", type: "number", category: "1", required: true },
                    { key: "corrosion_allowance", label: "Corrosion Allowance (mm)", type: "number", category: "1", required: true },
                    { key: "radiography", label: "Radiography", type: "text", category: "2", required: false },
                    { key: "heat_treatment", label: "Heat Treatment", type: "text", category: "2", required: false }
                ]
            }
        ];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Bootstrap Modal
            updateModal = new bootstrap.Modal(document.getElementById('updateModal'));

            // Get equipment ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const equipId = urlParams.get('id');

            if (!equipId) {
                showToast('Equipment ID tidak ditemukan', 'error');
                return;
            }

            loadEquipmentData(equipId);
        });

        // Load Equipment Data
        function loadEquipmentData(equipId) {
            const equipmentRef = database.ref('equipment');

            equipmentRef.orderByChild('equip_id').equalTo(equipId).once('value')
                .then((snapshot) => {
                    if (!snapshot.exists()) {
                        showToast('Equipment tidak ditemukan', 'error');
                        return;
                    }

                    snapshot.forEach((childSnapshot) => {
                        equipmentKey = childSnapshot.key;
                        currentEquipment = childSnapshot.val();
                    });

                    renderEquipmentInfo();
                    renderDataSections();
                    updateProgress();
                })
                .catch((error) => {
                    console.error('Error loading equipment:', error);
                    showToast('Gagal memuat data: ' + error.message, 'error');
                });
        }

        // Render Equipment Info
        function renderEquipmentInfo() {
            document.getElementById('equipmentName').textContent = currentEquipment.nama || '-';
            document.getElementById('equipmentId').textContent = currentEquipment.equip_id || '-';

            const catBadge = document.getElementById('categoryBadge');
            if (currentEquipment.kategori === 1) {
                catBadge.textContent = 'EHS Critical';
                catBadge.className = 'badge bg-danger';
            } else {
                catBadge.textContent = 'Standard';
                catBadge.className = 'badge bg-success';
            }
        }

        // Render Data Sections
        function renderDataSections() {
            const container = document.getElementById('dataContainer');
            container.innerHTML = '';

            dataStructure.forEach((section, sectionIndex) => {
                // Section Header
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'mb-4';
                sectionDiv.innerHTML = `
                    <h5 class="mb-3" style="color: var(--color-olive);">
                        <i class="fas fa-folder-open me-2"></i>${section.section}
                    </h5>
                `;

                // Fields
                section.fields.forEach((field, fieldIndex) => {
                    const value = currentEquipment[field.key] || '';
                    const isMissing = !value || value === '';
                    const isWarning = field.category === '1' && isMissing;

                    const itemDiv = document.createElement('div');
                    itemDiv.className = `data-item ${isWarning ? 'missing' : (isMissing ? 'warning' : 'filled')}`;
                    itemDiv.id = `item-${field.key}`;

                    itemDiv.innerHTML = `
                        <div class="data-header">
                            <div>
                                <div class="data-title">
                                    ${fieldIndex + 1}. ${field.label}
                                </div>
                                <div class="data-badges mt-1">
                                    <span class="badge-category">Kategori ${field.category}</span>
                                    <span class="badge-type">${field.type}</span>
                                    ${field.required ? '<span class="badge-w">W</span>' : ''}
                                </div>
                            </div>
                            <button class="btn-update" onclick="openUpdateModal('${field.key}', '${field.label}', '${field.type}')" data-key="${field.key}">
                                <i class="fas fa-edit me-1"></i>Update
                            </button>
                        </div>
                        <div class="data-value ${isMissing ? 'missing' : 'filled'}" id="value-${field.key}">
                            ${isMissing ? '<i class="fas fa-exclamation-circle me-2"></i>Data belum diisi' : value}
                        </div>
                    `;

                    sectionDiv.appendChild(itemDiv);
                });

                container.appendChild(sectionDiv);
            });
        }

        // Open Update Modal
        function openUpdateModal(key, label, type) {
            const currentValue = currentEquipment[key] || '';

            document.getElementById('fieldKey').value = key;
            document.getElementById('fieldLabel').textContent = label;
            document.getElementById('fieldValue').value = currentValue;
            document.getElementById('fieldValue').type = type === 'number' ? 'number' : 'text';
            document.getElementById('modalTitle').textContent = 'Update ' + label;

            // Reset button state
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save me-2"></i>Simpan';

            updateModal.show();

            // Focus input after modal shown
            setTimeout(() => {
                document.getElementById('fieldValue').focus();
                document.getElementById('fieldValue').select();
            }, 100);
        }

        // Save Data - RELIABLE VERSION
        function saveData() {
            const key = document.getElementById('fieldKey').value;
            const value = document.getElementById('fieldValue').value.trim();
            const saveBtn = document.getElementById('saveBtn');

            // Validation
            if (!value) {
                showToast('Nilai tidak boleh kosong', 'error');
                document.getElementById('fieldValue').focus();
                return;
            }

            // Disable button to prevent double-click
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Menyimpan...';

            // Prepare update data
            const updateData = {};
            updateData[key] = value;
            updateData['updated_at'] = new Date().toISOString();
            updateData['updated_by'] = auth.currentUser ? auth.currentUser.email : 'unknown';

            // Update to Firebase
            const equipmentRef = database.ref('equipment/' + equipmentKey);

            equipmentRef.update(updateData)
                .then(() => {
                    // Update local data
                    currentEquipment[key] = value;
                    currentEquipment['updated_at'] = updateData['updated_at'];
                    currentEquipment['updated_by'] = updateData['updated_by'];

                    // Update UI immediately
                    updateFieldUI(key, value);
                    updateProgress();

                    // Close modal
                    updateModal.hide();

                    // Show success message
                    showToast('Data berhasil disimpan!', 'success');

                    console.log('Update successful:', key, value);
                })
                .catch((error) => {
                    console.error('Update failed:', error);
                    showToast('Gagal menyimpan: ' + error.message, 'error');

                    // Re-enable button
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="fas fa-save me-2"></i>Simpan';
                });
        }

        // Update Field UI Immediately
        function updateFieldUI(key, value) {
            const valueElement = document.getElementById(`value-${key}`);
            const itemElement = document.getElementById(`item-${key}`);

            if (valueElement && itemElement) {
                // Update value display
                valueElement.textContent = value;
                valueElement.classList.remove('missing');
                valueElement.classList.add('filled');

                // Update item styling
                itemElement.classList.remove('missing', 'warning');
                itemElement.classList.add('filled');

                // Add animation effect
                itemElement.style.animation = 'highlightUpdate 1s ease';
                setTimeout(() => {
                    itemElement.style.animation = '';
                }, 1000);
            }
        }

        // Update Progress
        function updateProgress() {
            let totalRequired = 0;
            let filledRequired = 0;
            let totalAll = 0;
            let filledAll = 0;

            dataStructure.forEach(section => {
                section.fields.forEach(field => {
                    totalAll++;
                    if (field.required) totalRequired++;

                    const value = currentEquipment[field.key];
                    if (value && value !== '') {
                        filledAll++;
                        if (field.required) filledRequired++;
                    }
                });
            });

            const percentage = totalRequired > 0 ? Math.round((filledRequired / totalRequired) * 100) : 0;

            document.getElementById('filledCount').textContent = filledAll;
            document.getElementById('totalCount').textContent = totalAll;
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressBar').textContent = percentage + '%';
        }

        // Show Toast Notification
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toastId = 'toast-' + Date.now();

            const toastHtml = `
                <div class="toast ${type}" id="${toastId}" role="alert">
                    <div class="toast-header bg-transparent border-0">
                        <i class="fas fa-${type === 'success' ? 'check-circle text-success' : 'exclamation-circle text-danger'} me-2"></i>
                        <strong class="me-auto">${type === 'success' ? 'Sukses' : 'Error'}</strong>
                        <button type="button" class="btn-close" onclick="removeToast('${toastId}')"></button>
                    </div>
                    <div class="toast-body">
                        ${message}
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', toastHtml);

            // Auto remove after 3 seconds
            setTimeout(() => {
                removeToast(toastId);
            }, 3000);
        }

        // Remove Toast
        function removeToast(toastId) {
            const toast = document.getElementById(toastId);
            if (toast) {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }
        }

        // Handle Enter key in modal
        document.getElementById('fieldValue').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                saveData();
            }
        });

        // Handle modal hidden event
        document.getElementById('updateModal').addEventListener('hidden.bs.modal', function() {
            // Reset form
            document.getElementById('updateForm').reset();

            // Reset button
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = false;
            saveBtn.innerHTML = '<i class="fas fa-save me-2"></i>Simpan';
        });

        // Add CSS animation for update highlight
        const style = document.createElement('style');
        style.textContent = `
            @keyframes highlightUpdate {
                0% { background-color: #fff; }
                50% { background-color: #d4edda; }
                100% { background-color: #f0fff4; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
